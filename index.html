<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Tarot Debug — Final Step</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden;
            /* Твой фиолетовый фон как база */
            background: radial-gradient(circle, #1a0536 0%, #05010c 100%) no-repeat center center fixed;
            background-size: cover;
            display: flex; justify-content: center; align-items: center;
        }

        /* Если картинка найдется, она перекроет градиент */
        .bg-fixed {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: url('bg.webp') center/cover no-repeat;
        }

        .video-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; object-fit: cover; opacity: 1;
        }

        /* СВЕТЛЯЧКИ (Жестко на передний план) */
        .sparkle {
            position: absolute; background: #fff; border-radius: 50%;
            box-shadow: 0 0 10px #c5a059; z-index: 5; pointer-events: none;
            animation: fly linear infinite;
        }
        @keyframes fly { from { transform: translate(0,0); opacity: 0; } 50% { opacity: 0.8; } to { transform: translate(var(--x), var(--y)); opacity: 0; } }

        .wrapper { display: flex; gap: 40px; z-index: 100; position: relative; }
        .card { width: 300px; height: 460px; perspective: 1000px; cursor: pointer; animation: lev 6s infinite ease-in-out; }
        @keyframes lev { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .inner { position: relative; width: 100%; height: 100%; transition: 0.8s; transform-style: preserve-3d; box-shadow: 0 15px 50px #000; border-radius: 20px; }
        .card.open .inner { transform: rotateY(180deg); }
        .f, .b { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; border: 3px solid #c5a059; display: flex; justify-content: center; align-items: center; }
        .f { background: #111; color: #c5a059; font-size: 80px; }
        .b { background: #000; color: #fff; transform: rotateY(180deg); box-shadow: inset 0 0 80px rgba(197, 160, 89, 0.3); }
        .sum { font-size: 48px; color: #c5a059; font-family: Georgia; }

        /* ИНДИКАТОР ОШИБКИ */
        #debug-info { position: fixed; bottom: 20px; left: 20px; color: red; font-size: 12px; z-index: 999; background: rgba(0,0,0,0.7); padding: 5px; }
    </style>
</head>
<body onclick="document.getElementById('v').play()">

    <div id="debug-info">Статус: Проверка файлов...</div>
    <div class="bg-fixed"></div>
    
    <video id="v" autoplay muted loop playsinline class="video-layer">
        <source src="1.mp4" type="video/mp4">
    </video>

    <div id="sparkle-box"></div>

    <div class="wrapper">
        <div class="card" onclick="flip(this)"><div class="inner"><div class="f">✦</div><div class="b"><div class="sum"></div></div></div></div>
        <div class="card" onclick="flip(this)"><div class="inner"><div class="f">✦</div><div class="b"><div class="sum"></div></div></div></div>
        <div class="card" onclick="flip(this)"><div class="inner"><div class="f">✦</div><div class="b"><div class="sum"></div></div></div></div>
    </div>

    <script>
        // Проверка загрузки картинки
        const img = new Image();
        img.src = 'bg.webp';
        img.onload = () => document.getElementById('debug-info').style.color = 'green', document.getElementById('debug-info').innerText = 'Фон: OK';
        img.onerror = () => document.getElementById('debug-info').innerText = 'Фон bg.webp НЕ НАЙДЕН в репозитории!';

        function flip(c) {
            if (c.classList.contains('open')) return;
            c.querySelector('.sum').innerText = ["10 000 ₽", "30 000 ₽", "50 000 ₽", "100 000 ₽", "ALL IN"][Math.floor(Math.random() * 5)];
            c.classList.add('open');
        }

        // Светлячки
        const box = document.getElementById('sparkle-box');
        for (let i = 0; i < 40; i++) {
            const s = document.createElement('div');
            s.className = 'sparkle';
            const size = Math.random() * 4 + 2;
            s.style.width = size + 'px'; s.style.height = size + 'px';
            s.style.left = Math.random() * 100 + '%'; s.style.top = Math.random() * 100 + '%';
            s.style.setProperty('--x', (Math.random() - 0.5) * 400 + 'px');
            s.style.setProperty('--y', (Math.random() - 0.5) * 400 + 'px');
            s.style.animationDuration = (Math.random() * 5 + 5) + 's';
            box.appendChild(s);
        }
    </script>
</body>
</html>
