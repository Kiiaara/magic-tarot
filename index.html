<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Magic Tarot — Final Production</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden;
            background: #05010c url('bg.webp') no-repeat center center fixed;
            background-size: cover;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Georgia', serif;
        }

        /* ВИДЕО ФОН */
        .video-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; object-fit: cover; 
            filter: brightness(0.4);
            pointer-events: none;
        }

        /* КОНТЕЙНЕР ДЛЯ СВЕТЛЯЧКОВ */
        #sparkle-box {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 50; /* Между видео и картами */
            pointer-events: none;
            overflow: hidden;
        }

        /* САМИ СВЕТЛЯЧКИ (Яркие и живые) */
        .sparkle {
            position: absolute; 
            background: #ffffff !important; /* Чистый белый центр */
            border-radius: 50%;
            /* Мощное золотое свечение без черных пятен */
            box-shadow: 
                0 0 10px 2px #ffffff, 
                0 0 20px 5px #c5a059, 
                0 0 40px 10px rgba(197, 160, 89, 0.6);
            pointer-events: none;
            opacity: 0;
            /* Важно: длительность берется из JS */
            animation: move-sparkle linear infinite;
        }

        @keyframes move-sparkle {
            0% { 
                transform: translate(0, 0); 
                opacity: 0; 
            }
            15% { opacity: 1; }
            85% { opacity: 1; }
            100% { 
                /* Летим к координатам, которые сгенерировал скрипт */
                transform: translate(var(--x), var(--y)); 
                opacity: 0; 
            }
        }

        /* ЗАГОЛОВОК */
        .main-header {
            position: absolute;
            top: 60px;
            z-index: 150;
            color: #c5a059;
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-align: center;
            text-shadow: 0 0 20px rgba(197, 160, 89, 0.7);
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .main-header { font-size: 20px; top: 40px; padding: 0 20px; }
        }

        /* КАРТЫ */
        .wrapper { display: flex; gap: 40px; z-index: 100; position: relative; }
        .card { width: 300px; height: 460px; perspective: 1200px; cursor: pointer; animation: lev 6s infinite ease-in-out; }
        
        .card:nth-child(1) { animation-delay: 0s; }
        .card:nth-child(2) { animation-delay: -2s; }
        .card:nth-child(3) { animation-delay: -4s; }
        
        @keyframes lev { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        
        .inner { 
            position: relative; width: 100%; height: 100%; 
            transition: 0.8s; transform-style: preserve-3d; border-radius: 20px;
            box-shadow: 0 15px 60px #000, 0 0 30px 5px rgba(197, 160, 89, 0.8), 0 0 60px 15px rgba(197, 160, 89, 0.4);
        }

        .card.open .inner { transform: rotateY(180deg); }
        
        .f, .back { 
            position: absolute; width: 100%; height: 100%; 
            backface-visibility: hidden; border-radius: 20px; 
            border: 3px solid #c5a059; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
        }

        .back { 
            background: #000 url('разворот.webp') no-repeat center center; 
            background-size: cover; background-blend-mode: darken; 
            background-color: rgba(0, 0, 0, 0.6); color: #fff; 
            transform: rotateY(180deg); box-shadow: inset 0 0 30px rgba(197, 160, 89, 0.4); 
        }
        
        .card:nth-child(1) .f { background: url('3 обложка.webp') no-repeat center center; background-size: cover; }
        .card:nth-child(2) .f { background: url('2 обложка.webp') no-repeat center center; background-size: cover; }
        .card:nth-child(3) .f { background: url('4 обложка.webp') no-repeat center center; background-size: cover; }

        .sum { font-size: 54px; font-weight: bold; color: #fff; text-shadow: 0 0 15px #c5a059, 0 0 30px #c5a059; }

        .magic-btn {
            position: fixed; bottom: 30px; z-index: 200; padding: 15px 30px;
            background: rgba(0, 0, 0, 0.8); color: #c5a059; text-decoration: none;
            font-weight: bold; letter-spacing: 2px; border: 2px solid #c5a059;
            border-radius: 50px; box-shadow: 0 0 20px rgba(197, 160, 89, 0.4);
            transition: 0.3s; cursor: pointer;
        }
        .magic-btn:hover { background: #c5a059; color: #000; box-shadow: 0 0 40px rgba(197, 160, 89, 0.8); transform: scale(1.1); }
    </style>
</head>
<body onclick="document.getElementById('v').play()">

    <video id="v" autoplay muted loop playsinline class="video-layer">
        <source src="1.mp4" type="video/mp4">
    </video>

    <h1 class="main-header">ᛃ УЗНАЙ СВОЙ БАЛАНС ᛃ</h1>

    <div id="sparkle-box"></div>
    
    <div class="wrapper">
        <div class="card" onclick="flip(this)"><div class="inner"><div class="f"></div><div class="back"><div class="sum"></div></div></div></div>
        <div class="card" onclick="flip(this)"><div class="inner"><div class="f"></div><div class="back"><div class="sum"></div></div></div></div>
        <div class="card" onclick="flip(this)"><div class="inner"><div class="f"></div><div class="back"><div class="sum"></div></div></div></div>
    </div>

    <script>
        function flip(c) {
            if (c.classList.contains('open')) return;
            const res = ["30 000 ₽", "50 000 ₽", "100 000 ₽", "300 000 ₽"];
            c.querySelector('.sum').innerText = res[Math.floor(Math.random() * res.length)];
            c.classList.add('open');
            document.getElementById('v').play();
        }

        const box = document.getElementById('sparkle-box');
        for (let i = 0; i < 50; i++) {
            const s = document.createElement('div');
            s.className = 'sparkle';
            
            // Крупный размер (как ты просила)
            const size = Math.random() * 8 + 6;
            s.style.width = size + 'px'; 
            s.style.height = size + 'px';
            
            // Рандомный старт по всему экрану
            s.style.left = Math.random() * 100 + '%'; 
            s.style.top = Math.random() * 100 + '%';
            
            // Вектор полета
            const dx = (Math.random() - 0.5) * 400 + 'px';
            const dy = (Math.random() - 0.5) * 400 + 'px';
            
            s.style.setProperty('--x', dx);
            s.style.setProperty('--y', dy);
            
            // Плавная анимация
            s.style.animationDuration = (Math.random() * 8 + 4) + 's';
            s.style.animationDelay = (Math.random() * 5) + 's';
            
            box.appendChild(s);
        }
    </script>
    <a href="slots.html" class="magic-btn">ВЫБРАТЬ ИГРУ</a>
</body>
</html>
