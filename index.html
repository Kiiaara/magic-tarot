<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Tarot - GitHub Edition</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Georgia', serif;
        }

        /* ВИДЕО-ФОН */
        .video-bg {
            position: fixed; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            transform: translate(-50%, -50%);
            z-index: -2; object-fit: cover;
            filter: brightness(0.5);
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent, #05010c);
            z-index: -1; pointer-events: none;
        }

        #particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        .main-wrapper { position: relative; display: flex; gap: 40px; z-index: 10; }

        .card { 
            width: 300px; height: 460px; perspective: 1200px; cursor: pointer;
            animation: levitate 6s ease-in-out infinite;
        }
        @keyframes levitate {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .card:nth-child(2) { animation-delay: -1.5s; }
        .card:nth-child(3) { animation-delay: -3s; }

        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d; box-shadow: 0 15px 50px #000; border-radius: 20px;
        }
        .card.open .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 20px;
            border: 3px solid #c5a059; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .card-front { background: #111; color: #c5a059; font-size: 80px; }
        .card-back { 
            background: #000; color: #fff; transform: rotateY(180deg); 
            box-shadow: inset 0 0 80px rgba(197, 160, 89, 0.3);
        }
        
        .amount { font-size: 48px; font-weight: bold; color: #c5a059; text-shadow: 0 0 20px #c5a059; }

        .dot { 
            position: absolute; background: #fff; border-radius: 50%; 
            opacity: 0.5; box-shadow: 0 0 10px #c5a059; animation: float linear infinite; 
        }
        @keyframes float { from { transform: translate(0, 0); } to { transform: translate(var(--x), var(--y)); } }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline class="video-bg">
        <source src="1.mp4" type="video/mp4">
        <img src="bg.jpg.jpg" style="width:100%; height:100%; object-fit:cover;">
    </video>

    <div class="overlay"></div>
    <div id="particles"></div>

    <div class="main-wrapper">
        <div class="card" onclick="flip(this)"><div class="card-inner"><div class="card-front">✦</div><div class="card-back"><div class="amount"></div></div></div></div>
        <div class="card" onclick="flip(this)"><div class="card-inner"><div class="card-front">✦</div><div class="card-back"><div class="amount"></div></div></div></div>
        <div class="card" onclick="flip(this)"><div class="card-inner"><div class="card-front">✦</div><div class="card-back"><div class="amount"></div></div></div></div>
    </div>

    <script>
        const res = ["5 000 ₽", "15 000 ₽", "30 000 ₽", "50 000 ₽", "100 000 ₽", "ALL IN"];
        function flip(c) {
            if (c.classList.contains('open')) return;
            c.querySelector('.amount').innerText = res[Math.floor(Math.random() * res.length)];
            c.classList.add('open');
        }

        const container = document.getElementById('particles');
        for (let i = 0; i < 40; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            const s = Math.random() * 4 + 2;
            dot.style.width = s + 'px'; dot.style.height = s + 'px';
            dot.style.left = Math.random() * 100 + '%'; dot.style.top = Math.random() * 100 + '%';
            dot.style.setProperty('--x', (Math.random() - 0.5) * 500 + 'px');
            dot.style.setProperty('--y', (Math.random() - 0.5) * 600 + 'px');
            dot.style.animationDuration = (Math.random() * 10 + 10) + 's';
            container.appendChild(dot);
        }
    </script>
</body>
</html>
