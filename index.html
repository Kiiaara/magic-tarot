<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Tarot — 100% Reliable</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #05010c; /* Темно-фиолетовый */
            display: flex; justify-content: center; align-items: center;
            font-family: 'Georgia', serif;
        }

        /* МАГИЧЕСКИЙ ФОН НА КОДЕ */
        #canvas-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        .main-wrapper {
            position: relative; display: flex; gap: 40px; z-index: 10;
        }

        /* КАРТЫ С ЛЕВИТАЦИЕЙ */
        .card {
            width: 300px; height: 460px; perspective: 1200px; cursor: pointer;
            animation: levitate 6s ease-in-out infinite;
        }
        @keyframes levitate {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .card:nth-child(2) { animation-delay: -1.5s; }
        .card:nth-child(3) { animation-delay: -3s; }

        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d; box-shadow: 0 15px 50px rgba(0,0,0,1); border-radius: 20px;
        }
        .card.open .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 20px;
            border: 3px solid #c5a059; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .card-front { background: #111; color: #c5a059; font-size: 100px; }
        .card-front::after { content: "✦"; }
        .card-back { background: #000; color: #fff; transform: rotateY(180deg); box-shadow: inset 0 0 80px rgba(197, 160, 89, 0.3); }
        
        .amount { font-size: 52px; font-weight: bold; color: #c5a059; text-shadow: 0 0 25px #c5a059; }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <div class="main-wrapper">
        <div class="card" onclick="flip(this)"><div class="card-inner"><div class="card-front"></div><div class="card-back"><div class="amount"></div></div></div></div>
        <div class="card" onclick="flip(this)"><div class="card-inner"><div class="card-front"></div><div class="card-back"><div class="amount"></div></div></div></div>
        <div class="card" onclick="flip(this)"><div class="card-inner"><div class="card-front"></div><div class="card-back"><div class="amount"></div></div></div></div>
    </div>

    <script>
        // ГЕНЕРАЦИЯ ЖИВОГО ФОНА (КОСМОС)
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let w, h, stars = [];

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < 150; i++) {
                stars.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    size: Math.random() * 2 + 1,
                    speed: Math.random() * 0.4 + 0.1,
                    opacity: Math.random(),
                    dir: Math.random() > 0.5 ? 1 : -1
                });
            }
        }

        function draw() {
            // Фон градиентом
            const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w);
            grad.addColorStop(0, '#1a0536');
            grad.addColorStop(1, '#05010c');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            // Рисуем и двигаем звезды
            stars.forEach(s => {
                ctx.fillStyle = `rgba(197, 160, 89, ${s.opacity})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
                
                s.y -= s.speed;
                s.opacity += 0.01 * s.dir;
                if (s.opacity >= 1 || s.opacity <= 0.3) s.dir *= -1;
                if (s.y < 0) s.y = h;
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();

        // ЛОГИКА КАРТ
        const res = ["10 000 ₽", "30 000 ₽", "50 000 ₽", "100 000 ₽", "ALL IN", "X2 DEP"];
        function flip(c) {
            if (c.classList.contains('open')) return;
            c.querySelector('.amount').innerText = res[Math.floor(Math.random() * res.length)];
            c.classList.add('open');
        }
    </script>
</body>
</html>
