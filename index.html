<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Magic Tarot — Final Production</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden;
            background: #05010c url('bg.webp') no-repeat center center fixed;
            background-size: cover;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Georgia', serif;
        }

        /* ВИДЕО ФОН */
        .video-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; object-fit: cover; 
            filter: brightness(0.4);
            pointer-events: none;
        }
/* КОНТЕЙНЕР ДЛЯ СВЕТЛЯЧКОВ */
        #sparkle-box {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2; /* Над видео (1), но под картами (100) */
            pointer-events: none;
            overflow: hidden;
        }

        /* САМИ СВЕТЛЯЧКИ (Крупные и яркие) */
        .sparkle {
            position: absolute; 
            background: #fff; 
            border-radius: 50%;
            /* Белое ядро + многослойное золотое свечение (чтобы не было черного центра) */
            box-shadow: 
                0 0 10px #fff, 
                0 0 20px #c5a059, 
                0 0 40px rgba(197, 160, 89, 0.8);
            pointer-events: none;
            animation: fly linear infinite;
            filter: blur(0.5px); /* Легкое размытие для естественности */
        }

        @keyframes fly { 
            0% { 
                transform: translate(0, 0); 
                opacity: 0; 
            } 
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { 
                /* Движение к заданным в JS координатам */
                transform: translate(var(--x), var(--y)); 
                opacity: 0; 
            } 
        }
/* ЗАГОЛОВОК СТРАНИЦЫ */
        .main-header {
            position: absolute;
            top: 60px; /* Отступ от верхнего края */
            z-index: 150;
            color: #c5a059;
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-align: center;
            text-shadow: 0 0 20px rgba(197, 160, 89, 0.7);
            pointer-events: none; /* Чтобы заголовок не мешал кликам */
        }

        /* Адаптив для мобилок */
        @media (max-width: 768px) {
            .main-header {
                font-size: 20px;
                top: 40px;
                padding: 0 20px;
            }
        }
        /* КАРТЫ */
        .wrapper { display: flex; gap: 40px; z-index: 100; position: relative; }
        .card { width: 300px; height: 460px; perspective: 1200px; cursor: pointer; animation: lev 6s infinite ease-in-out; }
        
        /* АСИНХРОННОСТЬ (РАЗНАЯ ЗАДЕРЖКА) */
        .card:nth-child(1) { animation-delay: 0s; }
        .card:nth-child(2) { animation-delay: -2s; }
        .card:nth-child(3) { animation-delay: -4s; }
        
        @keyframes lev { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        
       .inner { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            transition: 0.8s; 
            transform-style: preserve-3d; 
            border-radius: 20px;
            
            /* ОБНОВЛЕННОЕ ЯРКОЕ СВЕЧЕНИЕ */
            box-shadow: 
                0 15px 60px #000,                      /* Глубокая тень для объема */
                0 0 30px 5px rgba(197, 160, 89, 0.8),   /* Внутренний плотный свет */
                0 0 60px 15px rgba(197, 160, 89, 0.4);  /* Внешний мягкий ореол */
        }
        .card.open .inner { transform: rotateY(180deg); }
        
        /* ОБЩИЕ СТИЛИ (Оставляем как базу для обеих сторон) */
        .f, .back { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 20px; 
            border: 3px solid #c5a059; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
        }

        /* УНИКАЛЬНЫЙ ФОН ДЛЯ ЗАДНЕЙ СТОРОНЫ (ОБЪЕДИНЕННЫЙ БЛОК) */
        .back { 
            /* 1. Задаем текстуру */
            background-image: url('разворот.webp'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            /* 2. Эффект тонирования поверх текстуры */
            background-color: rgba(0, 0, 0, 0.6); 
            background-blend-mode: darken; 

            color: #fff; 
            transform: rotateY(180deg); /* Это критически важно для разворота! */
            
            /* 3. Мягкое внутреннее золотое свечение */
            box-shadow: inset 0 0 30px rgba(197, 160, 89, 0.4); 
        }
        
        /* ОБЩИЕ СТИЛИ ДЛЯ ВСЕХ ОБЛОЖЕК (Рубашка) */
        .f { 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        /* Убираем старый символ ✦ */
        .f::after { content: none; }

        /* ПЕРСОНАЛЬНЫЕ КАРТИНКИ ДЛЯ КАЖДОЙ КАРТЫ (Обложки) */
        .card:nth-child(1) .f { background-image: url('3 обложка.webp'); }
        .card:nth-child(2) .f { background-image: url('2 обложка.webp'); }
        .card:nth-child(3) .f { background-image: url('4 обложка.webp'); }

        .sum {
    font-size: 54px;
    font-weight: bold;
    color: #fff;
    text-shadow: 0 0 15px #c5a059, 0 0 30px #c5a059;
    display: inline-block;
    white-space: nowrap;
    
   }
    </style>
</head>
<body onclick="document.getElementById('v').play()">

    <video id="v" autoplay muted loop playsinline class="video-layer">
        <source src="1.mp4" type="video/mp4">
    </video>

    <h1 class="main-header">ᛃ УЗНАЙ СВОЙ БАЛАНС ᛃ</h1>

    <div id="sparkle-box"></div>
    
    <div class="wrapper">
        <div class="card" onclick="flip(this)"><div class="inner"><div class="f"></div><div class="back"><div class="sum"></div></div></div></div>
        <div class="card" onclick="flip(this)"><div class="inner"><div class="f"></div><div class="back"><div class="sum"></div></div></div></div>
        <div class="card" onclick="flip(this)"><div class="inner"><div class="f"></div><div class="back"><div class="sum"></div></div></div></div>
    </div>

    <script>
        function flip(c) {
            if (c.classList.contains('open')) return;
            const res = ["30 000 ₽", "50 000 ₽", "100 000 ₽", "300 000 ₽"];
            c.querySelector('.sum').innerText = res[Math.floor(Math.random() * res.length)];
            c.classList.add('open');
            document.getElementById('v').play();
        }

       const box = document.getElementById('sparkle-box');
        // Увеличим количество для красоты
        for (let i = 0; i < 60; i++) {
            const s = document.createElement('div');
            s.className = 'sparkle';
            
            // Размер как ты просила (от 5 до 13px)
            const size = Math.random() * 8 + 5;
            s.style.width = size + 'px'; 
            s.style.height = size + 'px';
            
            // Начальная позиция рандомно по всему экрану
            s.style.left = Math.random() * 100 + '%'; 
            s.style.top = Math.random() * 100 + '%';
            
            // Дистанция полета (куда лететь)
            const destinationX = (Math.random() - 0.5) * 600 + 'px';
            const destinationY = (Math.random() - 0.5) * 600 + 'px';
            
            s.style.setProperty('--x', destinationX);
            s.style.setProperty('--y', destinationY);
            
            // Плавность и задержка
            s.style.animationDuration = (Math.random() * 10 + 5) + 's';
            s.style.animationDelay = (Math.random() * 5) + 's';
            
            box.appendChild(s);
        }
    </script>
    <a href="slots.html" class="magic-btn">ВЫБРАТЬ ИГРУ</a>

<style>
    .magic-btn {
        position: fixed;
        bottom: 30px;
        z-index: 200;
        padding: 15px 30px;
        background: rgba(0, 0, 0, 0.8);
        color: #c5a059;
        text-decoration: none;
        font-family: 'Georgia', serif;
        font-weight: bold;
        letter-spacing: 2px;
        border: 2px solid #c5a059;
        border-radius: 50px;
        box-shadow: 0 0 20px rgba(197, 160, 89, 0.4);
        transition: 0.3s;
        cursor: pointer;
    }
    .magic-btn:hover {
        background: #c5a059;
        color: #000;
        box-shadow: 0 0 40px rgba(197, 160, 89, 0.8);
        transform: scale(1.1);
    }
</style>
</body>
</html>
