<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Magic Tarot — Final Production</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden;
            background: #05010c url('bg.webp') no-repeat center center fixed;
            background-size: cover;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Georgia', serif;
        }

        /* ВИДЕО ФОН */
        .video-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; object-fit: cover; 
            filter: brightness(0.4);
            pointer-events: none;
        }

        /* СВЕТЛЯЧКИ */
        .sparkle {
            position: absolute; background: #fff; border-radius: 50%;
            box-shadow: 0 0 10px #c5a059, 0 0 20px #c5a059;
            z-index: 5; pointer-events: none;
            animation: fly linear infinite;
        }
        @keyframes fly { 
            from { transform: translate(0,0); opacity: 0; } 
            50% { opacity: 0.8; } 
            to { transform: translate(var(--x), var(--y)); opacity: 0; } 
        }

        /* КАРТЫ */
        .wrapper { display: flex; gap: 40px; z-index: 100; position: relative; }
        .card { width: 300px; height: 460px; perspective: 1200px; cursor: pointer; animation: lev 6s infinite ease-in-out; }
        @keyframes lev { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        
       .inner { 
            position: relative; 
            width: 100%; 
            height: 100%; 
            transition: 0.8s; 
            transform-style: preserve-3d; 
            border-radius: 20px;
            
            /* КОМБИНИРОВАННАЯ ТЕНЬ: 
               1. Черная (0 15px 60px #000) — для объема и отделения от фона.
               2. Золотая (0 0 40px 10px rgba(197, 160, 89, 0.6)) — само свечение. */
            box-shadow: 0 15px 60px #000, 0 0 40px 10px rgba(197, 160, 89, 0.6); 
        }
        .card.open .inner { transform: rotateY(180deg); }
        
       /* ОБЩИЕ СТИЛИ СТОРОН */
        .f, .back { 
            position: absolute; width: 100%; height: 100%; 
            backface-visibility: hidden; border-radius: 20px; 
            border: 3px solid #c5a059; display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        
       /* --- ОБЩИЕ СТИЛИ ДЛЯ ВСЕХ ОБЛОЖЕК --- */
        .f { 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        /* Убираем старый символ ✦ */
        .f::after { content: none; }

        /* ПЕРСОНАЛЬНЫЕ КАРТИНКИ ДЛЯ КАЖДОЙ КАРТЫ */
        
        /* Первая карта */
        .card:nth-child(1) .f {
            background-image: url('3 обложка.webp'); 
        }

        /* Вторая карта */
        .card:nth-child(2) .f {
            background-image: url('2 обложка.webp'); 
        }

        /* Третья карта */
        .card:nth-child(3) .f {
            background-image: url('4 обложка.webp'); 
        }
        
        .back { 
            background: #000; transform: rotateY(180deg); 
            /* Мягкое внутреннее свечение */
            box-shadow: inset 0 0 20px rgba(197, 160, 89, 0.4); 
        }

        .sum {
            font-size: 54px;
            font-weight: bold;
            color: #fff; /* Сделал текст белым для яркости */
            text-shadow: 0 0 15px #c5a059, 0 0 30px #c5a059; /* Золотое свечение */
            display: inline-block;
            white-space: nowrap;
            /* Убрал разворот отсюда, так как он мешал */
            transform: none; 
        }
    </style>
</head>
<body onclick="document.getElementById('v').play()">

    <video id="v" autoplay muted loop playsinline class="video-layer">
        <source src="1.mp4" type="video/mp4">
    </video>

    <div id="sparkle-box"></div>

    <div class="wrapper">
        <div class="card" onclick="flip(this)"><div class="inner"><div class="f"></div><div class="back"><div class="sum"></div></div></div></div>
        <div class="card" onclick="flip(this)"><div class="inner"><div class="f"></div><div class="back"><div class="sum"></div></div></div></div>
        <div class="card" onclick="flip(this)"><div class="inner"><div class="f"></div><div class="back"><div class="sum"></div></div></div></div>
    </div>

    <script>
        function flip(c) {
            if (c.classList.contains('open')) return;
            const res = ["30 000 ₽", "50 000 ₽", "100 000 ₽", "300 000 ₽"];
            c.querySelector('.sum').innerText = res[Math.floor(Math.random() * res.length)];
            c.classList.add('open');
            document.getElementById('v').play();
        }

        const box = document.getElementById('sparkle-box');
        for (let i = 0; i < 45; i++) {
            const s = document.createElement('div');
            s.className = 'sparkle';
            const size = Math.random() * 3 + 2;
            s.style.width = size + 'px'; s.style.height = size + 'px';
            s.style.left = Math.random() * 100 + '%'; s.style.top = Math.random() * 100 + '%';
            s.style.setProperty('--x', (Math.random() - 0.5) * 500 + 'px');
            s.style.setProperty('--y', (Math.random() - 0.5) * 500 + 'px');
            s.style.animationDuration = (Math.random() * 6 + 4) + 's';
            box.appendChild(s);
        }
    </script>
</body>
</html>
