<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Tarot - Fixed Layers</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #05010c; /* Фиолетовый фон по умолчанию */
            display: flex; justify-content: center; align-items: center;
            font-family: 'Georgia', serif;
        }

        /* КНОПКА ЗАГРУЗКИ (скроем её для записи, нажав пробел) */
        #upload-btn {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            background: #c5a059; color: #000; border: none;
            padding: 8px 12px; border-radius: 4px; cursor: pointer;
            font-weight: bold; opacity: 0.6; transition: 0.3s;
        }
        #upload-btn:hover { opacity: 1; }

        /* КОНТЕЙНЕР ДЛЯ ТВОЕГО ФОНА */
        #bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; /* Самый дальний слой */
            background-size: cover; background-position: center;
        }

        /* ПУЛЬСИРУЮЩИЙ ТУМАН (поверх твоего фона) */
        .fog {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(26, 5, 54, 0.4) 0%, transparent 70%);
            z-index: -1; animation: breatheFog 8s infinite;
        }

        @keyframes breatheFog {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        /* СВЕТЛЯЧКИ НА CSS (они не пропадут) */
        .dot {
            position: absolute; background: #fff; border-radius: 50%;
            box-shadow: 0 0 10px #c5a059; opacity: 0.6; z-index: 0; /* Перед фоном, но за картами */
            animation: move linear infinite;
        }
        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(var(--x), var(--y)); }
        }

        /* КАРТЫ С ЛЕВИТАЦИЕЙ */
        .wrapper { position: relative; display: flex; gap: 40px; z-index: 10; }
        .card { 
            width: 300px; height: 460px; perspective: 1200px; cursor: pointer;
            animation: levitate 6s ease-in-out infinite;
        }
        @keyframes levitate { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .card:nth-child(1) { animation-delay: 0s; }
        .card:nth-child(2) { animation-delay: -1s; }
        .card:nth-child(3) { animation-delay: -2s; }

        .inner { position: relative; width: 100%; height: 100%; transition: 0.8s; transform-style: preserve-3d; box-shadow: 0 15px 50px #000; border-radius: 20px; }
        .card.open .inner { transform: rotateY(180deg); }

        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; border: 3px solid #c5a059; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .front { background: #111; color: #c5a059; font-size: 80px; }
        .front::after { content: "✦"; }
        .back { background: #000; color: #fff; transform: rotateY(180deg); box-shadow: inset 0 0 80px rgba(197, 160, 89, 0.3); }
        .sum { font-size: 48px; font-weight: bold; color: #c5a059; text-shadow: 0 0 20px #c5a059; }
    </style>
</head>
