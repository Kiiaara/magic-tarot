<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Tarot — WebP Edition</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #05010c;
            display: flex; justify-content: center; align-items: center;
        }

        /* 1. ФОНОВЫЙ КОНТЕЙНЕР */
        #bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            /* ПРОВЕРЬ ТУТ НАЗВАНИЕ ФАЙЛА */
            background: url('bg.webp') center/cover no-repeat;
        }

        /* 2. ВИДЕО (если оно все еще 1.mp4) */
        .video-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -1;
        }

        /* 3. СВЕТЛЯЧКИ (CSS) */
        #sparkles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }
        .dot {
            position: absolute; background: #fff; border-radius: 50%;
            box-shadow: 0 0 10px #c5a059; opacity: 0;
            animation: move linear infinite;
        }
        @keyframes move {
            from { transform: translate(0, 0); opacity: 0; }
            50% { opacity: 0.8; }
            to { transform: translate(var(--tx), var(--ty)); opacity: 0; }
        }

        /* 4. КАРТЫ */
        .wrapper { position: relative; display: flex; gap: 40px; z-index: 10; }
        .card { width: 300px; height: 460px; perspective: 1200px; cursor: pointer; animation: lev 6s ease-in-out infinite; }
        @keyframes lev { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .inner { position: relative; width: 100%; height: 100%; transition: 0.8s; transform-style: preserve-3d; box-shadow: 0 15px 50px #000; border-radius: 20px; }
        .card.open .inner { transform: rotateY(180deg); }
        .f, .b { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; border: 3px solid #c5a059; display: flex; justify-content: center; align-items: center; }
        .f { background: #111; color: #c5a059; font-size: 80px; }
        .f::after { content: "✦"; }
        .b { background: #000; color: #fff; transform: rotateY(180deg); box-shadow: inset 0 0 80px rgba(197, 160, 89, 0.3); }
        .sum { font-size: 48px; font-weight: bold; color: #c5a059; text-shadow: 0 0 20px #c5a059; font-family: 'Georgia', serif; }
    </style>
</head>
<body onclick="document.getElementById('v').play()">

    <div id="bg-container">
        <video id="v" autoplay muted loop playsinline class="video-bg">
            <source src="1.mp4" type="video/mp4">
        </video>
    </div>

    <div id="sparkles"></div>

    <div class="wrapper">
        <div class="card" onclick="flip(this)"><div class="inner"><div class="f"></div><div class="back"><div class="sum"></div></div></div></div>
        <div class="card" onclick="flip(this)"><div class="inner"><div class="f"></div><div class="back"><div class="sum"></div></div></div></div>
        <div class="card" onclick="flip(this)"><div class="inner"><div class="f"></div><div class="back"><div class="sum"></div></div></div></div>
    </div>

    <script>
        const res = ["10 000 ₽", "30 000 ₽", "50 000 ₽", "100 000 ₽", "ALL IN"];
        function flip(c) {
            if (c.classList.contains('open')) return;
            c.querySelector('.sum').innerText = res[Math.floor(Math.random() * res.length)];
            c.classList.add('open');
        }

        const container = document.getElementById('sparkles');
        for (let i = 0; i < 50; i++) {
            const d = document.createElement('div');
            d.className = 'dot';
            const s = Math.random() * 3 + 2;
            d.style.width = s + 'px'; d.style.height = s + 'px';
            d.style.left = Math.random() * 100 + '%'; d.style.top = Math.random() * 100 + '%';
            d.style.setProperty('--tx', (Math.random() - 0.5) * 400 + 'px');
            d.style.setProperty('--ty', (Math.random() - 0.5) * 400 + 'px');
            d.style.animationDuration = (Math.random() * 5 + 5) + 's';
            d.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(d);
        }
    </script>
</body>
</html>
