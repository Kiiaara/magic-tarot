<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Magic Tarot — Final Debug</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; display: flex; justify-content: center; align-items: center; }
        
        /* Видео фон */
        .video-bg {
            position: fixed; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            transform: translate(-50%, -50%);
            z-index: -2; object-fit: cover;
            filter: brightness(0.4);
            display: block;
        }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent, #05010c); z-index: -1; }
        .main-wrapper { position: relative; display: flex; gap: 40px; z-index: 10; }
        
        /* Карты */
        .card { width: 300px; height: 460px; perspective: 1200px; cursor: pointer; animation: levitate 6s ease-in-out infinite; }
        @keyframes levitate { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .card-inner { position: relative; width: 100%; height: 100%; transition: 0.8s; transform-style: preserve-3d; box-shadow: 0 20px 60px #000; border-radius: 20px; }
        .card.open .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; border: 3px solid #c5a059; display: flex; justify-content: center; align-items: center; }
        .card-front { background: #111; color: #c5a059; font-size: 80px; }
        .card-back { background: #000; color: #fff; transform: rotateY(180deg); }
        .amount { font-size: 48px; font-weight: bold; color: #c5a059; }

        /* Текст статуса (для дебага) */
        #status { position: fixed; bottom: 10px; left: 10px; color: #c5a059; font-size: 10px; z-index: 100; opacity: 0.5; }
    </style>
</head>
<body onclick="forcePlay()">

    <div id="status">Ожидание клика для запуска видео...</div>

    <video id="bgVideo" preload="auto" autoplay muted loop playsinline class="video-bg">
        <source src="./1.mp4" type="video/mp4">
        <source src="1.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="main-wrapper">
        <div class="card" onclick="flip(this)"><div class="card-inner"><div class="card-front">✦</div><div class="card-back"><div class="amount"></div></div></div></div>
        <div class="card" onclick="flip(this)"><div class="card-inner"><div class="card-front">✦</div><div class="card-back"><div class="amount"></div></div></div></div>
        <div class="card" onclick="flip(this)"><div class="card-inner"><div class="card-front">✦</div><div class="card-back"><div class="amount"></div></div></div></div>
    </div>

    <script>
        const video = document.getElementById('bgVideo');
        const status = document.getElementById('status');

        function forcePlay() {
            video.play().then(() => {
                status.innerText = "Видео запущено";
            }).catch(err => {
                status.innerText = "Ошибка запуска: " + err.message;
            });
        }

        // Логика карт
        const res = ["10 000 ₽", "30 000 ₽", "50 000 ₽", "100 000 ₽", "ALL IN"];
        function flip(c) {
            if (c.classList.contains('open')) return;
            c.querySelector('.amount').innerText = res[Math.floor(Math.random() * res.length)];
            c.classList.add('open');
            forcePlay();
        }

        // Проверка загрузки видео
        video.onloadeddata = () => { status.innerText = "Видео загружено, нажмите для старта"; };
        video.onerror = () => { status.innerText = "Файл видео не найден или кодек не поддерживается"; };
    </script>
</body>
</html>
