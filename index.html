<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Tarot — Final Fix</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #05010c;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Georgia', serif;
        }

        /* 1. ФОНОВЫЙ СЛОЙ (ВИДЕО ИЛИ КАРТИНКА) */
        #bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -3;
        }
        .bg-media {
            width: 100%; height: 100%; object-fit: cover;
            filter: brightness(0.5); /* Затемнение для атмосферности */
        }

        /* 2. СЛОЙ ДЛЯ СВЕТЛЯЧКОВ (CANVAS) */
        #sparkles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        /* 3. КАРТЫ */
        .main-wrapper {
            position: relative; display: flex; gap: 40px; z-index: 10;
        }
        .card {
            width: 300px; height: 460px; perspective: 1200px; cursor: pointer;
            animation: levitate 6s ease-in-out infinite;
        }
        @keyframes levitate {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .card:nth-child(2) { animation-delay: -1.5s; }
        .card:nth-child(3) { animation-delay: -3s; }

        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d; box-shadow: 0 15px 50px rgba(0,0,0,1); border-radius: 20px;
        }
        .card.open .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 20px;
            border: 3px solid #c5a059; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .card-front { background: #111; color: #c5a059; font-size: 80px; }
        .card-front::after { content: "✦"; }
        .card-back { 
            background: #000; color: #fff; transform: rotateY(180deg); 
            box-shadow: inset 0 0 80px rgba(197, 160, 89, 0.3);
        }
        .amount { font-size: 48px; font-weight: bold; color: #c5a059; text-shadow: 0 0 20px #c5a059; }
    </style>
</head>
<body onclick="tryPlayVideo()">

    <div id="bg-container">
        <video id="mainVideo" autoplay muted loop playsinline class="bg-media">
            <source src="1.mp4" type="video/mp4">
            <img src="bg.jpg.jpg" class="bg-media">
        </video>
    </div>

    <canvas id="sparkles"></canvas>

    <div class="main-wrapper">
        <div class="card" onclick="flip(this)"><div class="card-inner"><div class="card-front"></div><div class="card-back"><div class="amount"></div></div></div></div>
        <div class="card" onclick="flip(this)"><div class="card-inner"><div class="card-front"></div><div class="card-back"><div class="amount"></div></div></div></div>
        <div class="card" onclick="flip(this)"><div class="card-inner"><div class="card-front"></div><div class="card-back"><div class="amount"></div></div></div></div>
    </div>

    <script>
        // 1. СВЕТЛЯЧКИ (CANVAS)
        const canvas = document.getElementById('sparkles');
        const ctx = canvas.getContext('2d');
        let w, h, dots = [];

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            dots = [];
            for (let i = 0; i < 60; i++) {
                dots.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    size: Math.random() * 3 + 1,
                    speed: Math.random() * 0.5 + 0.2,
                    opacity: Math.random()
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, w, h);
            dots.forEach(d => {
                ctx.fillStyle = `rgba(197, 160, 89, ${d.opacity})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#c5a059";
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
                ctx.fill();
                
                d.y -= d.speed;
                if (d.y < -10) d.y = h + 10;
            });
            requestAnimationFrame(draw);
        }

        // 2. ЛОГИКА КАРТ
        const res = ["10 000 ₽", "30 000 ₽", "50 000 ₽", "100 000 ₽", "ALL IN"];
        function flip(c) {
            if (c.classList.contains('open')) return;
            c.querySelector('.amount').innerText = res[Math.floor(Math.random() * res.length)];
            c.classList.add('open');
            tryPlayVideo();
        }

        function tryPlayVideo() {
            const v = document.getElementById('mainVideo');
            if (v) v.play();
        }

        window.addEventListener('resize', init);
        init();
        draw();
    </script>
</body>
</html>
