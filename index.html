<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Tarot — Ultra Final</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Georgia', serif;
        }

        /* ВИДЕО-ФОН */
        .video-bg {
            position: fixed; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            transform: translate(-50%, -50%);
            z-index: -2; object-fit: cover;
            filter: brightness(0.4); /* Затемнение */
        }

        /* ОБЕРТКА ДЛЯ КАРТ */
        .main-wrapper { 
            position: relative; display: flex; gap: 40px; z-index: 10; 
            perspective: 1500px; /* Важно для 3D переворота */
        }

        /* КАРТА (Родительский элемент) */
        .card { 
            width: 300px; height: 460px; cursor: pointer;
            animation: levitate 6s ease-in-out infinite;
        }
        @keyframes levitate {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        /* Разная задержка левитации */
        .card:nth-child(1) { animation-delay: 0s; }
        .card:nth-child(2) { animation-delay: -1.5s; }
        .card:nth-child(3) { animation-delay: -3s; }

        /* ВНУТРЕННИЙ КОНТЕЙНЕР (Который крутится) */
        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d; /* Включает 3D */
            box-shadow: 0 20px 60px rgba(0,0,0,1); border-radius: 20px;
        }

        /* Класс, который добавляет JS для переворота */
        .card.open .card-inner { 
            transform: rotateY(180deg); 
        }

        /* ОБЩИЕ СТИЛИ СТОРОН */
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 20px;
            border: 3px solid #c5a059; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* ЛИЦЕВАЯ СТОРОНА */
        .card-front { 
            background: #111; color: #c5a059; font-size: 100px; 
            z-index: 2; /* Лицо сверху */
        }

        /*РУБАШКА (Задняя сторона)*/
        .card-back { 
            background: #000; color: #fff; 
            transform: rotateY(180deg); /* Изначально развернута */
            box-shadow: inset 0 0 100px rgba(197, 160, 89, 0.3);
            z-index: 1;
        }
        
        .amount { 
            font-size: 52px; font-weight: bold; color: #c5a059; 
            text-shadow: 0 0 25px #c5a059; 
        }
    </style>
</head>
<body onclick="startVideo()">

    <video id="bgVideo" autoplay muted loop playsinline class="video-bg">
        <source src="1.mp4" type="video/mp4">
    </video>
    <div style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-3; background: url('bg.jpg.jpg') center/cover no-repeat; filter: brightness(0.4);"></div>

    <div class="main-wrapper">
        <div class="card" onclick="flip(this)">
            <div class="card-inner">
                <div class="card-front">✦</div>
                <div class="card-back"><div class="amount"></div></div>
            </div>
        </div>
        <div class="card" onclick="flip(this)">
            <div class="card-inner">
                <div class="card-front">✦</div>
                <div class="card-back"><div class="amount"></div></div>
            </div>
        </div>
        <div class="card" onclick="flip(this)">
            <div class="card-inner">
                <div class="card-front">✦</div>
                <div class="card-back"><div class="amount"></div></div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('bgVideo');

        // Принудительный запуск видео (для обхода блокировок браузера)
        function startVideo() {
            if (video) video.play();
        }

        const res = ["10 000 ₽", "30 000 ₽", "50 000 ₽", "100 000 ₽", "ALL IN"];
        
        function flip(cardElement) {
            // Если карта уже открыта, ничего не делаем
            if (cardElement.classList.contains('open')) return;
            
            // Вставляем случайную сумму
            cardElement.querySelector('.amount').innerText = res[Math.floor(Math.random() * res.length)];
            
            // Добавляем класс переворота
            cardElement.classList.add('open');
            
            // Запускаем видео, если оно вдруг стояло
            startVideo(); 
        }
    </script>
</body>
</html>
