<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Slots — Pro Edition</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #05010c url('bg.webp') no-repeat center center fixed;
            background-size: cover; font-family: 'Georgia', serif;
            display: flex; flex-direction: column; align-items: center;
            color: #fff; overflow-x: hidden;
        }

        .video-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; object-fit: cover; filter: brightness(0.4);
            pointer-events: none;
        }

        .header-title { 
            position: relative; z-index: 10; color: #c5a059; 
            margin: 20px 0 10px 0; text-shadow: 0 0 20px #c5a059; 
            font-size: 24px; text-transform: uppercase;
        }

        .magic-btn-back {
            position: relative; z-index: 200; margin-bottom: 20px;
            padding: 10px 20px; background: rgba(0, 0, 0, 0.8);
            color: #c5a059; text-decoration: none; font-size: 13px;
            border: 2px solid #c5a059; border-radius: 50px;
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.4); transition: 0.3s;
        }
        .magic-btn-back:hover { background: #c5a059; color: #000; transform: scale(1.05); }

        /* СЕТКА НА ВЕСЬ ЭКРАН */
        .slots-grid { 
            position: relative; z-index: 100;
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); 
            gap: 8px; padding: 10px; width: 98%; 
            box-sizing: border-box;
        }

        .card { width: 80px; height: 110px; perspective: 1000px; cursor: pointer; }
        
        .inner { 
            position: relative; width: 100%; height: 100%; 
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
            transform-style: preserve-3d;
        }
        
        .card.open .inner { transform: rotateY(180deg); }
        
        .f, .back { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            backface-visibility: hidden; -webkit-backface-visibility: hidden;
            border-radius: 8px; border: 1.5px solid #c5a059; 
            display: flex; align-items: center; justify-content: center;
        }
        
        /* Лицевая сторона (Обложка) */
        .f { 
            background: #111 url('разворот.webp') center/cover no-repeat; 
            filter: brightness(1.2) contrast(1.1);
            z-index: 2; transform: rotateY(0deg);
        }
        
        /* Рубашка (Текст) */
        .back { 
            background: #000; color: #fff; 
            transform: rotateY(180deg);
            padding: 5px; box-sizing: border-box;
            box-shadow: inset 0 0 15px rgba(197, 160, 89, 0.5);
            z-index: 1;
        }
        
        .slot-name { 
            font-size: 9px; font-weight: bold; color: #c5a059;
            text-shadow: 0 0 5px #c5a059; text-align: center;
            word-wrap: break-word;
                  }
    </style>
</head>
<body onclick="document.getElementById('v').play()">

    <video id="v" autoplay muted loop playsinline class="video-layer">
        <source src="1.mp4" type="video/mp4">
    </video>

    <h1 class="header-title">Библиотека Слотов</h1>
    <a href="index.html" class="magic-btn-back">✦ ВЕРНУТЬСЯ К ПРЕДСКАЗАНИЯМ</a>

    <div class="slots-grid" id="grid"></div>

    <script>
        const slotNames = [
            "Gates of Olympus", "Sweet Bonanza", "Sugar Rush", "Big Bass Splash",
            "The Dog House", "Starlight Princess", "Fruit Party", "Book of Dead",
            "Wanted Dead", "Le Bandit", "Zeus vs Hades", "Mental", "San Quentin", "Rip City"
        ];

        const grid = document.getElementById('grid');

        for (let i = 0; i < 150; i++) {
            const name = slotNames[i % slotNames.length];
            const cardHTML = `
                <div class="card" onclick="this.classList.toggle('open')">
                    <div class="inner">
                        <div class="f"></div>
                        <div class="back">
                            <div class="slot-name">${name}</div>
                        </div>
                    </div>
                </div>
            `;
            grid.innerHTML += cardHTML;
        }
    </script>
</body>
</html>
