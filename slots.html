<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Slots — Elite 90 Edition</title>
    <style>
        @font-face {
            font-family: 'AlgeriaTwo';
            src: url('fonts/algeriatwo.ttf') format('truetype');
            font-weight: normal; font-style: normal;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #05010c url('bg.webp') no-repeat center center fixed;
            background-size: cover; 
            font-family: 'AlgeriaTwo', serif;
            display: flex; flex-direction: column; align-items: center;
            color: #fff; overflow-x: hidden;
        }

        .video-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; object-fit: cover; filter: brightness(0.35);
            pointer-events: none;
        }

        .music-control-btn {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            width: 65px; height: 65px; border-radius: 50%;
            background: rgba(0, 0, 0, 0.6); border: 2px solid #c5a059;
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(5px); box-shadow: 0 0 15px rgba(197, 160, 89, 0.4);
            transition: 0.3s;
        }
        
        .music-control-btn svg { width: 32px; height: 32px; stroke: #c5a059; filter: drop-shadow(0 0 5px rgba(197, 160, 89, 0.8)); transition: 0.3s; }

        .header-fixed {
            position: fixed; top: 0; left: 0; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            z-index: 500; padding-top: 15px;
            background: rgba(5, 1, 12, 0.7); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(197, 160, 89, 0.2);
        }

        .header-title { 
            color: #c5a059; margin: 0 0 10px 0; text-shadow: 0 0 20px #c5a059; 
            font-size: 32px; text-transform: uppercase; letter-spacing: 3px;
        }
        .header-title span { font-size: 40px; vertical-align: middle; margin: 0 10px; display: inline-block; }

        .magic-btn-back {
            position: relative; z-index: 200; margin-bottom: 15px;
            padding: 8px 20px; background: rgba(0, 0, 0, 0.8);
            color: #c5a059; text-decoration: none; font-size: 13px;
            font-weight: bold; border: 2px solid #c5a059; border-radius: 50px;
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.4); transition: 0.3s;
        }

        /* ОСНОВНОЙ КОНТЕЙНЕР */
        .content-wrapper {
            display: flex;
            width: 100%;
            margin-top: 150px;
            z-index: 100;
            padding: 0 20px;
            box-sizing: border-box;
            gap: 15px;
        }

        /* СЕТКА (9 СТОЛБЦОВ) */
        .slots-grid { 
            flex: 9;
            display: grid; 
            grid-template-columns: repeat(9, 1fr); 
            gap: 6px; 
            padding: 10px;
        }

        /* САЙДБАР (ПРОВАЙДЕРЫ) */
        .sidebar {
            flex: 1.8;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px;
        }

        .provider-btn {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #c5a059;
            border-radius: 12px;
            padding: 15px 5px;
            color: #c5a059;
            text-decoration: none;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 10px rgba(197, 160, 89, 0.2);
            cursor: pointer;
        }
        .provider-btn:hover {
            background: #c5a059;
            color: #000;
            box-shadow: 0 0 30px #c5a059;
            transform: scale(1.05);
        }

        .card { width: 100%; height: 90px; perspective: 1000px; cursor: pointer; }
        .inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; border-radius: 6px; }
        .card.open .inner { transform: rotateY(180deg); }
        .card.hot-glow .inner { box-shadow: 0 0 25px 8px rgba(197, 160, 89, 0.8); animation: glow-pulse 2s infinite ease-in-out; }

        @keyframes glow-pulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }

        .f, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 6px; border: 1.5px solid #c5a059; display: flex; align-items: center; justify-content: center; }
        .f { background: rgba(0, 0, 0, 0.8) url('разворот.webp') center/cover; }
        .f::after { content: '⚚'; font-size: 26px; color: #fff; text-shadow: 0 0 10px #c5a059; }
        .back { background: #000; transform: rotateY(180deg); padding: 5px; box-sizing: border-box; box-shadow: inset 0 0 15px rgba(197, 160, 89, 0.5); }

        .slot-name { font-size: 11px; font-weight: bold; color: #c5a059; text-align: center; word-wrap: break-word; line-height: 1.1; text-transform: uppercase; }

        @media (max-width: 1024px) {
            .content-wrapper { flex-direction: column; margin-top: 160px; }
            .slots-grid { grid-template-columns: repeat(6, 1fr); }
            .sidebar { flex-direction: row; flex-wrap: wrap; }
            .provider-btn { flex: 1; min-width: 120px; font-size: 12px; }
        }
    </style>
</head>
<body onclick="startInteraction()">

    <audio id="bg-music" loop><source src="magic-ambient.mp3" type="audio/mpeg"></audio>
    <audio id="flip-sound"><source src="flip-magic.mp3" type="audio/mpeg"></audio>

    <video id="v" autoplay muted loop playsinline class="video-layer"><source src="1.mp4" type="video/mp4"></video>

    <div class="header-fixed">
        <h1 class="header-title"><span>ᛃ</span> TOP 90 SELECTION <span>ᛃ</span></h1>
        <a href="index.html" class="magic-btn-back">Вернуться</a>
    </div>

    <div class="content-wrapper">
        <div class="slots-grid" id="grid"></div>

        <div class="sidebar">
            <a href="hacksaw.html" class="provider-btn">Hacksaw</a>
            <a href="pragmatic.html" class="provider-btn">Pragmatic</a>
            <a href="bgaming.html" class="provider-btn">BGaming</a>
            <a href="belatra.html" class="provider-btn">Belatra</a>
            <a href="truelab.html" class="provider-btn">TrueLab</a>
        </div>
    </div>

    <script>
        const bgMusic = document.getElementById('bg-music');
        const flipSnd = document.getElementById('flip-sound');

        function startInteraction() {
            document.getElementById('v').play();
            if (bgMusic.paused) {
                bgMusic.volume = 0.2;
                bgMusic.play();
            }
        }

        window.flipCard = function(el) {
            if (el.classList.contains('open')) return;
            flipSnd.currentTime = 0; flipSnd.playbackRate = 2; flipSnd.volume = 0.3; flipSnd.play();
            el.classList.add('open');
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // --- ТОЛЬКО ТОП-90 С БОНУСБАЕМ ИЗ ТВОИХ СПИСКОВ ---
        const top90Slots = [
            // Hacksaw (25)
            "Wanted Dead or a Wild", "Le Bandit", "RIP City", "Chaos Crew II", "Hand of Anubis", "Slayers Inc", "Rotten", "Fist of Destruction", "Chaos Crew 3", "Ze Zeus", "Pray for Three", "Mayan Stackways", "Stack 'Em", "Dark Summoning", "Wings of Horus", "Mystery Motel", "Alpha Eagle", "Double Rainbow", "Gronk's Gems", "Vending Machine", "Twisted Lab", "Rusty & Curly", "Cash Crew", "Book of Time", "Temple of Torment",
            // Pragmatic (35)
            "Gates of Olympus 1000", "Sugar Rush 1000", "Sweet Bonanza 1000", "Starlight Princess 1000", "Zeus vs Hades – Gods of War 250", "Big Bass Splash 1000", "Wisdom of Athena 1000 Xmas", "The Dog House Megaways", "Gems Bonanza", "Madame Destiny Megaways", "Cleocatra", "Forge of Olympus", "Juicy Fruits", "Fruit Party 2", "Release the Bison", "Rise of Pyramids", "Fire Portals", "Candy Corner", "Moleionaire", "Gods of Giza", "Buffalo King Megaways", "Congo Cash XL", "Mystery Mice", "Angel vs Sinner", "Sumo Supreme Megaways", "Yeti Quest", "Hand of Midas 2", "Medusa’s Stone", "Devilicious", "Wildies", "Sweet Bonanza", "Starlight Princess Pachi", "Fruity Treats", "Candy Blitz Bombs", "Aztec Powernudge",
            // BGaming (15)
            "Aztec Clusters", "Elvis Frog Trueways", "Bonanza Billion", "Snoop Dogg Dollars", "Gemza", "Alien Fruits 2", "Mice & Magic Wonder Spin", "Dice Bonanza", "Gemhalla", "Savage Buffalo Spirit Megaways", "Sweet Rush Megaways", "Potion Spells", "Luck and Magic", "Bone Bonanza", "Maneki 88 Gold",
            // Belatra (10)
            "MummyLand Treasures", "Crystals Digger", "Big Wild Buffalo", "Rise of Zeus", "Fortune Mummy", "Voodoo Coins", "Tony Gambler", "4 Secrets of Aladdin", "Richy Hog", "Dragon's Bonanza",
            // TrueLab (5)
            "Victoria Wild West", "Sunstrike Supernova", "Guns, Love & Therapy", "Book of Truth", "Micropirates"
        ];

        const randomizedNames = shuffle([...top90Slots]);
        const grid = document.getElementById('grid');
        let htmlContent = '';

        for (let i = 0; i < 90; i++) {
            const name = randomizedNames[i];
            htmlContent += `
                <div class="card" onclick="flipCard(this)">
                    <div class="inner">
                        <div class="f"></div>
                        <div class="back">
                            <div class="slot-name">${name}</div>
                        </div>
                    </div>
                </div>`;
        }
        grid.innerHTML = htmlContent;

        const allCards = document.querySelectorAll('.card');
        shuffle(Array.from(Array(allCards.length).keys())).slice(0, 15).forEach(idx => {
            allCards[idx].classList.add('hot-glow');
        });
    </script>
</body>
</html>
