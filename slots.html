<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Slots — Elite 100 Edition</title>
    <style>
        @font-face {
            font-family: 'AlgeriaTwo';
            src: url('fonts/algeriatwo.ttf') format('truetype');
            font-weight: normal; font-style: normal;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #05010c url('bg.webp') no-repeat center center fixed;
            background-size: cover; 
            font-family: 'AlgeriaTwo', serif;
            display: flex; flex-direction: column; align-items: center;
            color: #fff; overflow-x: hidden;
        }

        .video-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; object-fit: cover; filter: brightness(0.35);
            pointer-events: none;
        }

        .music-control-btn {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            width: 65px; height: 65px; border-radius: 50%;
            background: rgba(0, 0, 0, 0.7); border: 2px solid #c5a059;
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(5px); box-shadow: 0 0 15px rgba(197, 160, 89, 0.4);
            transition: 0.3s;
        }
        .music-control-btn svg { width: 32px; height: 32px; stroke: #c5a059; filter: drop-shadow(0 0 5px rgba(197, 160, 89, 0.8)); }

        .header-fixed {
            position: fixed; top: 0; left: 0; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            z-index: 500; padding-top: 15px;
            background: rgba(5, 1, 12, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(197, 160, 89, 0.2);
        }

        .header-title { color: #c5a059; margin: 0 0 10px 0; text-shadow: 0 0 20px #c5a059; font-size: 32px; text-transform: uppercase; letter-spacing: 3px; }

        .magic-btn-back {
            position: relative; z-index: 200; margin-bottom: 15px;
            padding: 8px 20px; background: rgba(0, 0, 0, 0.8);
            color: #c5a059; text-decoration: none; font-size: 13px;
            font-weight: bold; border: 2px solid #c5a059; border-radius: 50px;
            transition: 0.3s;
        }

        .content-wrapper { display: flex; width: 100%; margin-top: 160px; z-index: 100; padding: 0 20px; box-sizing: border-box; gap: 10px; }
        
        /* СЕТКА (10 СТОЛБЦОВ) */
        .slots-grid { flex: 10; display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; padding: 10px; }
        
        /* САЙДБАР (КОМПАКТНЫЙ) */
        .sidebar { flex: 1.1; display: flex; flex-direction: column; gap: 30px; padding: 10px; min-width: 120px; }

        .provider-btn {
            background: rgba(0, 0, 0, 0.85); border: 2px solid #c5a059; border-radius: 10px;
            padding: 15px 5px; color: #c5a059; text-decoration: none; text-align: center;
            font-weight: bold; text-transform: uppercase; font-size: 20px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 10px rgba(197, 160, 89, 0.2);
        }
        .provider-btn:hover { background: #c5a059; color: #000; box-shadow: 0 0 30px #c5a059; transform: scale(1.05); }

        /* КАРТОЧКИ */
        .card { width: 100%; height: 100px; perspective: 1000px; cursor: pointer; }
        .inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; border-radius: 8px; }
        
        /* Фикс флипа: принудительно держим 180 градусов, если карта открыта */
        .card.open .inner { transform: rotateY(180deg) !important; }

        .card.hot-glow .inner { box-shadow: 0 0 20px 5px rgba(197, 160, 89, 0.8); animation: glow-pulse 2s infinite ease-in-out; }
        .card.open.hot-glow .inner { animation: none; box-shadow: 0 0 30px 10px rgba(197, 160, 89, 0.6); }

        @keyframes glow-pulse { 0%, 100% { box-shadow: 0 0 15px 5px rgba(197, 160, 89, 0.6); } 50% { box-shadow: 0 0 30px 12px rgba(197, 160, 89, 1); } }

        .f, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 8px; border: 1.5px solid #c5a059; display: flex; align-items: center; justify-content: center; }
        
        /* Базовая темная рубашка */
        .f { background: rgba(0, 0, 0, 0.8) url('разворот.webp') center/cover; background-blend-mode: darken; }
        
        /* Класс для шахматки (светлая версия) */
        .card.zebra-light .f { background-color: rgba(0, 0, 0, 0.3); background-blend-mode: normal; }

        .f::after { content: '⚚'; font-size: 30px; color: #fff; text-shadow: 0 0 10px #c5a059; }
        .back { background: #000; transform: rotateY(180deg); padding: 8px; box-sizing: border-box; box-shadow: inset 0 0 20px rgba(197, 160, 89, 0.4); }

        .slot-name { 
            font-size: 18px; 
            font-weight: bold; 
            color: #c5a059; 
            text-align: center; 
            word-wrap: break-word; 
            line-height: 1.1; 
            text-transform: uppercase;
            padding: 0 5px;
        }

        @media (max-width: 1200px) { .slots-grid { grid-template-columns: repeat(8, 1fr); } }
        @media (max-width: 768px) {
            .content-wrapper { flex-direction: column; }
            .slots-grid { grid-template-columns: repeat(5, 1fr); }
            .sidebar { flex-direction: row; flex-wrap: wrap; }
            .provider-btn { flex: 1; min-width: 100px; }
            .slot-name { font-size: 12px; }
        }
    </style>
</head>
<body onclick="startInteraction()">

    <audio id="bg-music" loop><source src="magic-ambient.mp3" type="audio/mpeg"></audio>
    <audio id="flip-sound"><source src="flip-magic.mp3" type="audio/mpeg"></audio>

    <button id="music-control" class="music-control-btn" onclick="toggleMusic(event)">
        <svg id="svg-mute" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
        <svg id="svg-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
    </button>

    <video id="v" autoplay muted loop playsinline class="video-layer"><source src="1.mp4" type="video/mp4"></video>

    <div class="header-fixed">
        <h1 class="header-title"><span>ᛃ</span> ТОП 100 ИГР <span>ᛃ</span></h1>
        <a href="index.html" class="magic-btn-back">ВЕРНУТЬСЯ К ВЫБОРУ БАЛАНСА</a>
    </div>

    <div class="content-wrapper">
        <div class="slots-grid" id="grid"></div>
        <div class="sidebar">
            <a href="hacksaw.html" class="provider-btn">Hacksaw</a>
            <a href="pragmatic.html" class="provider-btn">Pragmatic</a>
            <a href="bgaming.html" class="provider-btn">BGaming</a>
            <a href="belatra.html" class="provider-btn">Belatra</a>
            <a href="truelab.html" class="provider-btn">TrueLab</a>
        </div>
    </div>

    <script>
        const bgMusic = document.getElementById('bg-music');
        const flipSnd = document.getElementById('flip-sound');
        const svgOn = document.getElementById('svg-on');
        const svgMute = document.getElementById('svg-mute');

        function startInteraction() {
            document.getElementById('v').play();
            if (bgMusic.paused) {
                bgMusic.volume = 0.2;
                bgMusic.play().then(() => {
                    svgOn.style.display = 'block';
                    svgMute.style.display = 'none';
                }).catch(e => console.log("Ждем клика"));
            }
        }

        function toggleMusic(event) {
            event.stopPropagation(); 
            if (bgMusic.paused) {
                bgMusic.play();
                svgOn.style.display = 'block';
                svgMute.style.display = 'none';
            } else {
                bgMusic.pause();
                svgOn.style.display = 'none';
                svgMute.style.display = 'block';
            }
        }

        window.flipCard = function(el) {
            if (el.classList.contains('open')) return;
            flipSnd.currentTime = 0; flipSnd.playbackRate = 2; flipSnd.volume = 0.3; flipSnd.play();
            el.classList.add('open');
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // --- ТОП-100 С ЛЮБИМЫМИ БОНУСКАМИ (СТРОГО ИЗ ТВОИХ СПИСКОВ) ---
        const top100Slots = [
            // Hacksaw (33)
            "Wanted Dead or a Wild", "Le Bandit", "RIP City", "Chaos Crew II", "Hand of Anubis", "Slayers Inc", "Rotten", "Fist of Destruction", "Chaos Crew 3", "Ze Zeus", "Pray for Three", "Mayan Stackways", "Stack 'Em", "Dark Summoning", "Wings of Horus", "Mystery Motel", "Alpha Eagle", "Double Rainbow", "Gronk's Gems", "Vending Machine", "Twisted Lab", "Rusty & Curly", "Cash Crew", "Book of Time", "Temple of Torment", "Dork Unit", "Octo Attack", "ITERO", "Keep'em Cool", "King Carrot", "Cubes 2", "Dork Unit", "Octo Attack",
            // Pragmatic (43)
            "Gates of Olympus 1000", "Sugar Rush 1000", "Sweet Bonanza 1000", "Starlight Princess 1000", "Zeus vs Hades – Gods of War 250", "Big Bass Splash 1000", "Wisdom of Athena 1000 Xmas", "The Dog House Megaways", "Gems Bonanza", "Madame Destiny Megaways", "Cleocatra", "Forge of Olympus", "Juicy Fruits", "Fruit Party 2", "Release the Bison", "Rise of Pyramids", "Fire Portals", "Candy Corner", "Moleionaire", "Gods of Giza", "Buffalo King Megaways", "Congo Cash XL", "Mystery Mice", "Angel vs Sinner", "Sumo Supreme Megaways", "Yeti Quest", "Hand of Midas 2", "Medusa’s Stone", "Devilicious", "Wildies", "Sweet Bonanza", "Starlight Princess Pachi", "Fruity Treats", "Candy Blitz Bombs", "Aztec Powernudge", "Big Bass Christmas Bash", "Viking Forge", "Gravity Bonanza", "Frozen Tropics", "Diamond Cascade", "Sky Bounty", "Cash Box", "Hellvis Wild",
            // BGaming (15)
            "Aztec Clusters", "Elvis Frog Trueways", "Bonanza Billion", "Snoop Dogg Dollars", "Gemza", "Alien Fruits 2", "Mice & Magic Wonder Spin", "Dice Bonanza", "Gemhalla", "Savage Buffalo Spirit Megaways", "Sweet Rush Megaways", "Potion Spells", "Luck and Magic", "Bone Bonanza", "Maneki 88 Gold",
            // Belatra (4)
            "MummyLand Treasures", "Crystals Digger", "Big Wild Buffalo", "Rise of Zeus",
            // TrueLab (5)
            "Victoria Wild West", "Sunstrike Supernova", "Guns, Love & Therapy", "Book of Truth", "Micropirates"
        ];

        const randomizedNames = shuffle([...top100Slots]);
        const grid = document.getElementById('grid');
        let htmlContent = '';

        for (let i = 0; i < 100; i++) {
            const name = randomizedNames[i];
            
            // ЛОГИКА ШАХМАТКИ: (номер ряда + номер колонки)
            const row = Math.floor(i / 10);
            const col = i % 10;
            const zebraClass = (row + col) % 2 === 0 ? 'zebra-light' : '';

            htmlContent += `
                <div class="card ${zebraClass}" onclick="flipCard(this)">
                    <div class="inner">
                        <div class="f"></div>
                        <div class="back">
                            <div class="slot-name">${name}</div>
                        </div>
                    </div>
                </div>`;
        }
        grid.innerHTML = htmlContent;

        const allCards = document.querySelectorAll('.card');
        shuffle(Array.from(Array(allCards.length).keys())).slice(0, 15).forEach(idx => {
            allCards[idx].classList.add('hot-glow');
        });
    </script>
</body>
</html>
