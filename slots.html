<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Slots — Horizontal Edition</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #05010c url('bg.webp') no-repeat center center fixed;
            background-size: cover; font-family: 'Georgia', serif;
            display: flex; flex-direction: column; align-items: center;
            color: #fff; overflow-x: hidden;
        }

        .video-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; object-fit: cover; filter: brightness(0.4);
            pointer-events: none;
        }

        /* ФИКСИРОВАННЫЙ ХЕДЕР */
        .header-fixed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 500; /* Самый высокий слой, чтобы быть над картами */
            padding-top: 20px;
            /* Эффект размытия, чтобы карты красиво уходили под заголовок */
            background: rgba(5, 1, 12, 0.5); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(197, 160, 89, 0.2);
        }

        .header-title { 
            position: relative; z-index: 10; color: #c5a059; 
            margin: 0 0 10px 0; text-shadow: 0 0 20px #c5a059; 
            font-size: 26px; text-transform: uppercase; letter-spacing: 2px;
        }

        .magic-btn-back {
            position: relative; z-index: 200; margin-bottom: 15px;
            padding: 10px 25px; background: rgba(0, 0, 0, 0.8);
            color: #c5a059; text-decoration: none; font-size: 13px;
            font-weight: bold; border: 2px solid #c5a059; border-radius: 50px;
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.4); transition: 0.3s;
        }

        /* КОРРЕКТИРОВКА СЕТКИ: Добавляем отступ сверху, чтобы шапка не закрывала первый ряд */
        .slots-grid { 
            position: relative; z-index: 100;
            margin-top: 140px; /* Отступ под высоту шапки */
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); 
            gap: 8px; padding: 20px; width: 100%; 
            box-sizing: border-box;
        }

        /* КАРТОЧКА: Теперь горизонтальная плитка */
        .card { 
            width: 100%; 
            height: 70px; /* Высота плитки */
            perspective: 1000px; cursor: pointer; 
        }
        
        .inner { 
            position: relative; width: 100%; height: 100%; 
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
            transform-style: preserve-3d;
        }
        
        .card.open .inner { transform: rotateY(180deg); }
        
        .f, .back { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            backface-visibility: hidden; -webkit-backface-visibility: hidden;
            border-radius: 6px; border: 1.5px solid #c5a059; 
            display: flex; align-items: center; justify-content: center;
        }
        
      /* Лицевая сторона (Обложка) */
        .f { 
            /* МЕНЯЕМ: Добавляем черный цвет фона для смешивания */
            background-color: rgba(0, 0, 0, 0.7); 
            background-image: url('разворот.webp');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* ВКЛЮЧАЕМ СМЕШИВАНИЕ: Это затемнит только лес */
            background-blend-mode: darken; 

            /* УДАЛЯЕМ filter: brightness, чтобы значок не тускнел */
            z-index: 2; 
            transform: rotateY(0deg);
            position: relative;
        }
        
        /* ЗНАЧОК ПОСЕРЕДИНЕ (Теперь максимально яркий) */
        .f::after {
            content: '❂'; 
            font-size: 22px; /* Чуть увеличил для акцента */
            color: #c5a059;
            /* УСИЛИВАЕМ СВЕЧЕНИЕ: Добавил второй слой тени */
            text-shadow: 0 0 10px #c5a059, 0 0 20px #c5a059; 
            opacity: 1; /* Ставим полную непрозрачность */
            position: absolute; /* Гарантируем центровку */
        }
        
        .back { 
            background: #000; color: #fff; 
            transform: rotateY(180deg);
            padding: 5px; box-sizing: border-box;
            box-shadow: inset 0 0 15px rgba(197, 160, 89, 0.5);
            z-index: 1;
        }
        
        .slot-name { 
            font-size: 11px; font-weight: bold; color: #c5a059;
            text-shadow: 0 0 5px #c5a059; text-align: center;
            word-wrap: break-word;
                   }
    </style>
</head>

</html>
