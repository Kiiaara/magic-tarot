<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Slots — 150 Cards</title>
    <style>
        body, html {
            margin: 0; padding: 0; 
            background: #05010c url('bg.webp') no-repeat center center fixed;
            background-size: cover; font-family: 'Georgia', serif;
            display: flex; flex-direction: column; align-items: center;
            color: #fff;
        }

        .header-title { 
            color: #c5a059; 
            margin: 30px 0 10px 0; 
            text-shadow: 0 0 20px #c5a059; 
            font-size: 28px; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Кнопка в стиле главной страницы */
        .magic-btn-back {
            margin: 20px 0 40px 0;
            padding: 12px 25px;
            background: rgba(0, 0, 0, 0.8);
            color: #c5a059;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            border: 2px solid #c5a059;
            border-radius: 50px;
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.4);
            transition: 0.3s;
            cursor: pointer;
        }
        .magic-btn-back:hover {
            background: #c5a059;
            color: #000;
            box-shadow: 0 0 30px rgba(197, 160, 89, 0.8);
            transform: scale(1.05);
        }

        /* Компактная сетка для 150 карт */
        .slots-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); 
            gap: 15px; 
            padding: 20px; 
            width: 95%;
            max-width: 1200px;
        }

        /* Маленькие карточки */
        .card { width: 120px; height: 160px; perspective: 1000px; cursor: pointer; }
        .inner { 
            position: relative; width: 100%; height: 100%; transition: 0.6s; 
            transform-style: preserve-3d; border-radius: 10px; 
            box-shadow: 0 5px 15px #000;
        }
        .card.open .inner { transform: rotateY(180deg); }
        
        .f, .back { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            border-radius: 10px; border: 1.5px solid #c5a059; display: flex; align-items: center; justify-content: center; text-align: center;
        }
        
        /* Обложка (твоя картинка) */
        .f { 
            background: #111 url('разворот.webp') center/cover; 
            background-blend-mode: multiply;
        }
        
        /* Разворот с названием */
        .back { 
            background: #000; color: #fff; transform: rotateY(180deg); padding: 5px;
            box-shadow: inset 0 0 15px rgba(197, 160, 89, 0.3);
        }
        
        .slot-name { 
            font-size: 12px; 
            font-weight: bold; 
            color: #c5a059;
            text-shadow: 0 0 5px #c5a059; 
            word-wrap: break-word;
            
            /* ФИКС ЗЕРКАЛЬНОСТИ: разворачиваем текст обратно по оси Y */
            transform: rotateY(180deg); 
            display: inline-block;
        }
    </style>
</head>
<body>

    <h1 class="header-title">ВЫБЕРИТЕ ИГРУ</h1>
    
    <a href="index.html" class="magic-btn-back">ВЕРНУТЬСЯ К ПРЕДСКАЗАНИЯМ</a>

    <div class="slots-grid" id="grid"></div>

    <script>
        // Добавь сюда свои названия слотов
        const slotNames = [
            "Gates of Olympus", "Sweet Bonanza", "Sugar Rush", "Big Bass",
            "The Dog House", "Starlight Princess", "Fruit Party", "Book of Dead",
            "Legacy of Dead", "Wanted Dead", "Le Bandit", "Zeus vs Hades",
            "Mental", "San Quentin", "Rip City", "Chaos Crew 2", "Dork Unit",
            "Buffalo King", "Wild West Gold", "Madame Destiny", "Gems Bonanza"
        ];

        const grid = document.getElementById('grid');

        // Генерируем 150 карточек автоматически
        for (let i = 0; i < 150; i++) {
            const name = slotNames[i % slotNames.length];
            const cardHTML = `
                <div class="card" onclick="this.classList.toggle('open')">
                    <div class="inner">
                        <div class="f"></div>
                        <div class="back">
                            <div class="slot-name">${name}</div>
                        </div>
                    </div>
                </div>
            `;
            grid.innerHTML += cardHTML;
        }
    </script>
</body>
</html>
