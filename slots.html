<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Slot Picker — 150 Cards</title>
    <style>
        body, html {
            margin: 0; padding: 0; background: #05010c url('bg.webp') no-repeat center center fixed;
            background-size: cover; font-family: 'Georgia', serif;
            display: flex; flex-direction: column; align-items: center;
        }
        .header-title { color: #c5a059; margin: 40px 0; text-shadow: 0 0 20px #c5a059; font-size: 32px; letter-spacing: 3px; }
        
        /* Сетка для 150 карт */
        .slots-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 25px; padding: 40px; width: 90%; 
        }

        .card { width: 100%; height: 280px; perspective: 1000px; cursor: pointer; }
        .inner { 
            position: relative; width: 100%; height: 100%; transition: 0.6s; 
            transform-style: preserve-3d; border-radius: 15px; 
            box-shadow: 0 10px 30px #000, 0 0 15px rgba(197, 160, 89, 0.3);
        }
        .card.open .inner { transform: rotateY(180deg); }
        
        .f, .back { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            border-radius: 15px; border: 2px solid #c5a059; display: flex; align-items: center; justify-content: center; text-align: center;
        }
        
        /* Обложка (используем твою текстуру) */
        .f { background: #111 url('разворот.webp') center/cover; }
        
        /* Разворот с названием слота */
        .back { 
            background: #000; color: #c5a059; transform: rotateY(180deg); padding: 10px;
            box-shadow: inset 0 0 30px rgba(197, 160, 89, 0.4);
        }
        .slot-name { 
            font-size: 18px; font-weight: bold; text-shadow: 0 0 10px #c5a059; 
            transform: scaleX(-1); /* Фикс зеркальности */
        }

        .back-btn { margin-bottom: 50px; color: #fff; text-decoration: none; border-bottom: 1px solid #fff; opacity: 0.6; }
    </style>
</head>
<body>

    <h1 class="header-title">ВЫБЕРИ СВОЙ СЛОТ</h1>
    
    <div class="slots-grid" id="grid"></div>

    <a href="index.html" class="back-btn">← Вернуться к предсказаниям</a>

    <script>
        // Список названий слотов (добавь сюда свои 150 названий)
        const slotNames = [
            "Gates of Olympus", "Sweet Bonanza", "Sugar Rush", "Big Bass Splash",
            "The Dog House", "Starlight Princess", "Fruit Party", "Book of Dead",
            "Legacy of Dead", "Wanted Dead or a Wild", "Le Bandit", "Zeus vs Hades",
            "Mental", "San Quentin", "Rip City", "Chaos Crew 2", "Dork Unit"
            // Просто копируй и вставляй названия через запятую
        ];

        const grid = document.getElementById('grid');

        // Генерируем 150 карточек
        for (let i = 0; i < 150; i++) {
            const name = slotNames[i % slotNames.length]; // Берет из списка по кругу
            const cardHTML = `
                <div class="card" onclick="this.classList.toggle('open')">
                    <div class="inner">
                        <div class="f"></div>
                        <div class="back">
                            <div class="slot-name">${name}</div>
                        </div>
                    </div>
                </div>
            `;
            grid.innerHTML += cardHTML;
        }
    </script>
</body>
</html>
