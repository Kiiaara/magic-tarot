<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Slots — Video Edition</title>
    <style>
        body, html {
            margin: 0; padding: 0; 
            background: #05010c url('bg.webp') no-repeat center center fixed;
            background-size: cover; font-family: 'Georgia', serif;
            display: flex; flex-direction: column; align-items: center;
            color: #fff;
            overflow-x: hidden;
        }

        .video-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; object-fit: cover; 
            filter: brightness(0.4);
            pointer-events: none;
        }

        .header-title { 
            position: relative; z-index: 10;
            color: #c5a059; margin: 30px 0 10px 0; 
            text-shadow: 0 0 20px #c5a059; font-size: 28px; 
            letter-spacing: 2px; text-transform: uppercase;
        }

        .magic-btn-back {
            position: relative; z-index: 200;
            margin: 20px 0 40px 0; padding: 12px 25px;
            background: rgba(0, 0, 0, 0.8); color: #c5a059;
            text-decoration: none; font-size: 14px; font-weight: bold;
            letter-spacing: 1px; border: 2px solid #c5a059;
            border-radius: 50px; box-shadow: 0 0 15px rgba(197, 160, 89, 0.4);
            transition: 0.3s; cursor: pointer;
        }
        .magic-btn-back:hover { background: #c5a059; color: #000; transform: scale(1.05); }

       /* 1. СЕТКА: делаем её максимально плотной */
        .slots-grid { 
            position: relative; z-index: 100;
            display: grid; 
            /* Авто-заполнение очень маленькими колонками по 45 пикселей */
            grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); 
            gap: 4px; /* Минимальный зазор между плитками */
            padding: 10px; 
            width: 98%; 
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 2. КАРТОЧКИ: теперь это мини-плитки */
        .card { 
            width: 45px; 
            height: 60px; 
            perspective: 1000px; 
            cursor: pointer; 
        }

        .inner { 
            position: relative; width: 100%; height: 100%; 
            transition: transform 0.5s ease; 
            transform-style: preserve-3d; 
            border-radius: 4px; 
        }

        .f, .back { 
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; 
            backface-visibility: hidden;
            border-radius: 4px; 
            border: 1px solid #c5a059; /* Тонкая рамка */
            display: flex; align-items: center; justify-content: center;
        }

        /* 3. ШРИФТ: делаем его микроскопическим, чтобы влез в плитку */
        .slot-name { 
            font-size: 7px; /* Очень мелкий шрифт */
            font-weight: bold; 
            color: #c5a059;
            text-shadow: 0 0 3px #c5a059; 
            word-wrap: break-word;
            line-height: 1;
            padding: 2px;
        }
    </style>
</head>
<body onclick="document.getElementById('v').play()">

    <video id="v" autoplay muted loop playsinline class="video-layer">
        <source src="1.mp4" type="video/mp4">
    </video>

    <h1 class="header-title">Библиотека Слотов</h1>
    
    <a href="index.html" class="magic-btn-back">✦ ВЕРНУТЬСЯ К ПРЕДСКАЗАНИЯМ</a>

    <div class="slots-grid" id="grid"></div>

    <script>
        const slotNames = [
            "Gates of Olympus", "Sweet Bonanza", "Sugar Rush", "Big Bass Splash",
            "The Dog House", "Starlight Princess", "Fruit Party", "Book of Dead",
            "Wanted Dead or a Wild", "Le Bandit", "Zeus vs Hades", "Mental"
        ];

        const grid = document.getElementById('grid');

        for (let i = 0; i < 150; i++) {
            const name = slotNames[i % slotNames.length];
            const cardHTML = `
                <div class="card" onclick="this.classList.toggle('open')">
                    <div class="inner">
                        <div class="f"></div>
                        <div class="back">
                            <div class="slot-name">${name}</div>
                        </div>
                    </div>
                </div>
            `;
            grid.innerHTML += cardHTML;
        }
    </script>
</body>
</html>
