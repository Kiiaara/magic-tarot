<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Slots — Final Release</title>
    <style>
        /* 1. ПОДКЛЮЧАЕМ НОВЫЙ ШРИФТ */
        @font-face {
            font-family: 'AlgeriaTwo';
            src: url('fonts/algeriatwo.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #05010c url('bg.webp') no-repeat center center fixed;
            background-size: cover; 
            font-family: 'AlgeriaTwo', serif;
            display: flex; flex-direction: column; align-items: center;
            color: #fff; overflow-x: hidden;
        }

        .video-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; object-fit: cover; filter: brightness(0.4);
            pointer-events: none;
        }

        /* КНОПКА УПРАВЛЕНИЯ ЗВУКОМ */
        .music-control-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #c5a059;
            color: #c5a059;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.4);
            transition: 0.3s;
        }

        /* ФИКСИРОВАННЫЙ ХЕДЕР */
        .header-fixed {
            position: fixed; top: 0; left: 0; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            z-index: 500; padding-top: 15px;
            background: rgba(5, 1, 12, 0.6); 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(197, 160, 89, 0.2);
        }

        .header-title { 
            position: relative; z-index: 10; color: #c5a059; 
            margin: 0 0 10px 0; text-shadow: 0 0 20px #c5a059; 
            font-size: 36px;
            text-transform: uppercase; letter-spacing: 3px;
        }

        .header-title span {
            font-size: 48px;
            vertical-align: middle;
            margin: 0 10px;
            display: inline-block;
        }

        .magic-btn-back {
            position: relative; z-index: 200; margin-bottom: 15px;
            padding: 10px 25px; background: rgba(0, 0, 0, 0.8);
            color: #c5a059; text-decoration: none; font-size: 14px;
            font-weight: bold; border: 2px solid #c5a059; border-radius: 50px;
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.4); transition: 0.3s;
            letter-spacing: 1px;
        }

        .magic-btn-back:hover {
            background: #c5a059; color: #000;
            box-shadow: 0 0 40px rgba(197, 160, 89, 0.8); 
            transform: scale(1.1); cursor: pointer;
        }

        .slots-grid { 
            position: relative; z-index: 100;
            margin-top: 150px; display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); 
            gap: 8px; padding: 20px; width: 100%; box-sizing: border-box;
        }

        .card { width: 100%; height: 75px; perspective: 1000px; cursor: pointer; }

        .inner { 
            position: relative; width: 100%; height: 100%; 
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
            transform-style: preserve-3d;
            border-radius: 6px;
        }

        .card.open .inner { transform: rotateY(180deg); }

        .card.hot-glow .inner {
            box-shadow: 0 0 25px 8px rgba(197, 160, 89, 0.8), 
                        inset 0 0 15px rgba(197, 160, 89, 0.6);
            animation: pulse-only-glow 2s infinite ease-in-out;
        }

        @keyframes pulse-only-glow {
            0%, 100% { box-shadow: 0 0 25px 8px rgba(197, 160, 89, 0.8); }
            50% { box-shadow: 0 0 45px 15px rgba(197, 160, 89, 1); }
        }

        .f, .back { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            backface-visibility: hidden; -webkit-backface-visibility: hidden;
            border-radius: 6px; border: 1.5px solid #c5a059; 
            display: flex; align-items: center; justify-content: center;
        }

        .f { 
            z-index: 2; transform: rotateY(0deg);
            background-color: rgba(0, 0, 0, 0.7); 
            background-image: url('разворот.webp'); background-size: cover;
            background-position: center; background-repeat: no-repeat;
            background-blend-mode: darken;
        }

        .card:nth-child(even) .f { 
            background-color: rgba(0, 0, 0, 0.3); 
            background-blend-mode: normal; 
        }

        .f::after {
            content: '⚚'; 
            font-size: 28px; color: #fff; 
            text-shadow: 0 0 5px #fff, 0 0 10px #c5a059, 0 0 20px #c5a059;
            position: absolute; z-index: 3;
            animation: symbol-breathe 4s infinite ease-in-out;
        }

        @keyframes symbol-breathe {
            0%, 100% { opacity: 0.8; filter: brightness(1); }
            50% { opacity: 1; filter: brightness(1.3); }
        }

        .back { 
            z-index: 1; background: #000; color: #fff; 
            transform: rotateY(180deg);
            padding: 5px; box-sizing: border-box;
            box-shadow: inset 0 0 15px rgba(197, 160, 89, 0.5);
        }

        .slot-name { 
            font-size: 13px; font-weight: bold; color: #c5a059;
            text-shadow: 0 0 5px #c5a059; text-align: center; word-wrap: break-word;
            line-height: 1.1;
        }

        @media (max-width: 768px) {
            .header-fixed { padding-top: 10px; }
            .header-title { 
                font-size: 18px !important; 
                white-space: nowrap; 
                display: flex; align-items: center; justify-content: center;
            }
            .header-title span { font-size: 24px !important; margin: 0 8px !important; }
            .slots-grid { margin-top: 165px !important; padding: 10px; gap: 6px; }
            .music-control-btn { top: auto; bottom: 20px; right: 20px; }
        }
    </style>
</head>
<body onclick="startInteraction()">

    <audio id="bg-music" loop>
        <source src="magic-ambient.mp3" type="audio/mpeg">
    </audio>
    <audio id="flip-sound">
        <source src="flip-magic.mp3" type="audio/mpeg">
    </audio>

    <button id="music-control" class="music-control-btn" onclick="toggleMusic(event)">
        <span id="music-icon">🔇</span>
    </button>

    <video id="v" autoplay muted loop playsinline class="video-layer">
        <source src="1.mp4" type="video/mp4">
    </video>

    <div class="header-fixed">
        <h1 class="header-title"><span>ᛃ</span> Сделай свой выбор <span>ᛃ</span></h1>
        <a href="index.html" class="magic-btn-back">Вернуться к предсказаниям</a>
    </div>

    <div class="slots-grid" id="grid"></div>

    <script>
        const bgMusic = document.getElementById('bg-music');
        const musicIcon = document.getElementById('music-icon');
        const flipSnd = document.getElementById('flip-sound');

        const slotNames = [
            "Wanted Dead or a Wild", "Le Bandit", "RIP City", "Chaos Crew 2", "Hand of Anubis", 
            "Gladiator Legends", "Rotten", "Undead Fortune", "Dork Unit", "Beam Boys", 
            "Evil Eyes", "Duel at Dawn", "Fist of Destruction", "Cursed Seas", "Bloodthirst", 
            "2 Wild 2 Die", "Fear the Dark", "Benny the Beer", "Fred's Food Truck", "Toshi Video Club", 
            "Beast Below", "Orb of Destiny", "Le Viking", "Stick'em", "Xpander", 
            "Keep 'em", "Stack 'em", "Bow of Artemis", "Angel vs Sinner", "Mystery Mice", 
            "Forging Wilds", "Gem Elevator", "Slayers Inc", "Itero", "Alpha Eagle", 
            "Vending Machine", "Tai the Toad", "Booze Bash", "Twisted Lab", "Hop 'n' Pop", 
            "The Count", "Time Spinners", "Eye of the Panda", "Frank's Farm", "Keep 'em Cool", 
            "Drop 'em", "Xmas Drop", "Buffalo Stack'n'Sync", "Ronin Stackways", "Donny Dough", 
            "Danny Dollar", "Feel the Beat", "Aztec Twist", "Break Bones", "Cubes", 
            "Cubes 2", "Cash Quest", "Dark Summoning", "Forest Fortune", "Wings of Horus", 
            "Double Rainbow", "Gronk's Gems", "Chaos Crew", "Mayan Stackways", "Warrior Ways", 
            "Fruit Duel", "Marlin Masters", "Wishbringer", "Aiko and the Wind Spirit", "Stormy Witch",
            "Gates of Olympus 1000", "Sugar Rush 1000", "Sweet Bonanza 1000", "Starlight Princess 1000", "Zeus vs Hades", 
            "Wisdom of Athena 1000", "The Dog House Megaways", "The Dog House Multihold", "Big Bass Splash", "Big Bass Floats My Boat", 
            "Gems Bonanza", "Madame Destiny Megaways", "Wild West Gold", "Cleocatra", "Forge of Olympus", 
            "Juicy Fruits", "Fruit Party 2", "Release the Bison", "Rise of Pyramids", "Fire Portals", 
            "Big Burger", "Candy Corner", "Moleionaire", "Trees of Treasure", "Loki's Riches", 
            "Gods of Giza", "The Red Queen", "Goblin Heist", "Wild Wild Riches Luck of the Irish", "Star Bounty", 
            "Drago Jewels of Fortune", "Release the Kraken 2", "Buffalo King Megaways", "Great Rhino Megaways", "Sword of Ares", 
            "Big Bass Amazon Xtreme", "Pub Kings", "Fat Panda", "Wisdom of Athena", "Badge Blitz", 
            "Oodles of Noodles", "Congo Cash XL", "Big Bass Vegas", "Sumo Supreme", "Yeti Quest", 
            "Dragon Gold 88", "Jackpot Hunter", "Samurai Code", "Crank it Up", "Sweet Kingdom", 
            "Hand of Midas 2", "Buffalo King Untamed", "Medusa's Stone", "Devilicious", "Wildies", 
            "Heroic Spins", "Starlight Princess Pachi", "Dwarf & Dragon", "Heart of Cleopatra", "Fruity Treats", 
            "Candy Blitz Bombs", "Barnyard Megaways", "Ice Lobster", "Aztec Powernudge", "Ripe Rewards", 
            "The Dog House Dog or Alive", "Gears of Horus", "Wheel o' Gold", "Mighty Munching Melons", "Strawberry Cocktail", 
            "The Alter Ego", "Red Hot Luck", "Good Luck & Good Fortune", "Year of the Dragon King", "Castle of Fire", 
            "The Big Dawgs", "Blade & Fangs", "The Wild Gang", "Nile Fortune", "Timber Stacks", 
            "Sugar Supreme", "Viking Forge", "Infective Wild", "Tundra's Fortune", "Demon Pots", 
            "Twilight Princess", "Gravity Bonanza", "Rainbow Reels", "Gold Oasis", "Golden Dragon", 
            "SixSixSix", "Cursed Crypt", "Bouncy Bombs", "Big Bass Mission Fishin'"
        ];

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startInteraction() {
            document.getElementById('v').play();
        }

        function toggleMusic(event) {
            event.stopPropagation();
            if (bgMusic.paused) {
                bgMusic.volume = 0.2; 
                bgMusic.play();
                musicIcon.innerText = '🔊';
            } else {
                bgMusic.pause();
                musicIcon.innerText = '🔇';
            }
        }

        // --- ГРОМКОСТЬ ПОПРАВЛЕНА ТУТ ---
        window.flipCard = function(el) {
            if (el.classList.contains('open')) return;

            flipSnd.currentTime = 0;
            flipSnd.playbackRate = 2; 
            
            // Установил на 0.2 (20%). Если хочешь тише — ставь 0.1
            flipSnd.volume = 0.2; 
            
            flipSnd.play();
            el.classList.toggle('open');
        }

        const randomizedNames = shuffle([...slotNames]);
        const grid = document.getElementById('grid');
        let htmlContent = '';

        for (let i = 0; i < 154; i++) {
            const name = randomizedNames[i % randomizedNames.length];
            htmlContent += `
                <div class="card" onclick="flipCard(this)">
                    <div class="inner">
                        <div class="f"></div>
                        <div class="back">
                            <div class="slot-name">${name}</div>
                        </div>
                    </div>
                </div>
            `;
        }
        grid.innerHTML = htmlContent;

        const allCards = document.querySelectorAll('.card');
        const shuffledIndices = shuffle(Array.from(Array(allCards.length).keys()));
        shuffledIndices.slice(0, 20).forEach(index => {
            allCards[index].classList.add('hot-glow');
        });
    </script>
</body>
</html>
