<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Magic Tarot - Fixed Layers</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #05010c;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Georgia', serif;
        }

        /* СЛОЙ ДЛЯ ТВОЕГО ФОНА */
        #bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; background-size: cover; background-position: center;
            transition: background 0.5s ease;
            filter: brightness(0.6);
        }

        /* ПУЛЬСИРУЮЩИЙ ТУМАН (чтобы фон не был скучным) */
        .fog {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(26, 5, 54, 0.4) 0%, transparent 70%);
            z-index: -1; animation: breathe 8s infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* СВЕТЛЯЧКИ НА CSS (Они не пропадут) */
        .dot {
            position: absolute; background: #fff; border-radius: 50%;
            box-shadow: 0 0 10px #c5a059; opacity: 0.6; z-index: 0;
            animation: move linear infinite;
        }
        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(var(--x), var(--y)); }
        }

        /* КАРТЫ */
        .wrapper { position: relative; display: flex; gap: 40px; z-index: 10; }
        .card { 
            width: 300px; height: 460px; perspective: 1200px; cursor: pointer;
            animation: levitate 6s ease-in-out infinite;
        }
        @keyframes levitate { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .card:nth-child(2) { animation-delay: -1.5s; }
        .card:nth-child(3) { animation-delay: -3s; }

        .inner { position: relative; width: 100%; height: 100%; transition: 0.8s; transform-style: preserve-3d; box-shadow: 0 15px 50px #000; border-radius: 20px; }
        .card.open .inner { transform: rotateY(180deg); }

        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; border: 3px solid #c5a059; display: flex; justify-content: center; align-items: center; }
        .front { background: #111; color: #c5a059; font-size: 80px; }
        .back { background: #000; color: #fff; transform: rotateY(180deg); box-shadow: inset 0 0 80px rgba(197, 160, 89, 0.3); }
        .sum { font-size: 48px; font-weight: bold; color: #c5a059; text-shadow: 0 0 20px #c5a059; }

        #hint { position: fixed; top: 20px; color: #c5a059; opacity: 0.5; z-index: 100; pointer-events: none; }
    </style>
</head>
<body ondragover="event.preventDefault()" ondrop="dropHandler(event)">

    <div id="bg-layer"></div>
    <div class="fog"></div>
    <div id="particles"></div>
    <div id="hint">Перетащи сюда картинку или видео для фона</div>

    <div class="wrapper">
        <div class="card" onclick="flip(this)"><div class="inner"><div class="front">✦</div><div class="back"><div class="sum"></div></div></div></div>
        <div class="card" onclick="flip(this)"><div class="inner"><div class="front">✦</div><div class="back"><div class="sum"></div></div></div></div>
        <div class="card" onclick="flip(this)"><div class="inner"><div class="front">✦</div><div class="back"><div class="sum"></div></div></div></div>
    </div>

    <script>
        // 1. ЛОГИКА ФОНА (DRAG & DROP)
        function dropHandler(e) {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            const url = URL.createObjectURL(file);
            const bg = document.getElementById('bg-layer');
            
            if (file.type.startsWith('video/')) {
                bg.innerHTML = `<video autoplay muted loop playsinline style="width:100%; height:100%; object-fit:cover;"><source src="${url}"></video>`;
            } else {
                bg.style.backgroundImage = `url(${url})`;
                bg.innerHTML = '';
            }
            document.getElementById('hint').style.display = 'none';
        }

        // 2. ЛОГИКА КАРТ
        const res = ["10 000 ₽", "30 000 ₽", "50 000 ₽", "100 000 ₽", "ALL IN"];
        function flip(c) {
            if (c.classList.contains('open')) return;
            c.querySelector('.sum').innerText = res[Math.floor(Math.random() * res.length)];
            c.classList.add('open');
        }

        // 3. СВЕТЛЯЧКИ
        const p = document.getElementById('particles');
        for (let i = 0; i < 40; i++) {
            const d = document.createElement('div');
            d.className = 'dot';
            const s = Math.random() * 4 + 2;
            d.style.width = s + 'px'; d.style.height = s + 'px';
            d.style.left = Math.random() * 100 + '%'; d.style.top = Math.random() * 100 + '%';
            d.style.setProperty('--x', (Math.random() - 0.5) * 600 + 'px');
            d.style.setProperty('--y', (Math.random() - 0.5) * 600 + 'px');
            d.style.animationDuration = (Math.random() * 10 + 10) + 's';
            p.appendChild(d);
        }
    </script>
</body>
</html>
