<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Procurement Widget Compact Glow</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: transparent;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Montserrat', sans-serif;
            color: white;
        }

        .widget-card {
            background: rgba(10, 10, 10, 0.95); 
            padding: 25px 40px; /* Компактные внутренние поля */
            border-radius: 35px; 
            border: 2px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(15px);
            
            /* Гибкая колонка */
            display: flex;
            flex-direction: column;
            align-items: center; 
            
            animation: borderBreathe 3s ease-in-out infinite;
        }

        @keyframes borderBreathe {
            0%, 100% { border-color: rgba(255, 215, 0, 0.2); box-shadow: 0 0 15px rgba(255, 215, 0, 0.1); }
            50% { border-color: rgba(255, 215, 0, 0.6); box-shadow: 0 0 30px rgba(255, 215, 0, 0.3); }
        }

        .row {
            display: flex;
            align-items: baseline; /* Чтобы буквы и цифры стояли на одной линии */
            margin-bottom: 10px;
            width: 100%;
        }

        .row:last-child { margin-bottom: 0; }

        .label {
            font-size: 32px; /* Крупные буквы */
            text-transform: uppercase;
            font-weight: 700;
            color: #ddd;
            
            /* Расстояние между текстом и цифрами */
            margin-right: 25px; 
            text-align: right;
            flex: 1; /* Прижимает текст к середине */
        }

        .value-container {
            flex: 1; /* Прижимает цифры к середине */
            text-align: left;
        }

        .value {
            font-size: 50px; /* Крупные цифры */
            font-weight: 900;
            line-height: 1;
            white-space: nowrap;
        }

        #purchased {
            color: #FFD700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
            animation: textBreathe 3s ease-in-out infinite;
        }

        @keyframes textBreathe {
            0%, 100% { transform: scale(1); text-shadow: 0 0 8px rgba(255, 215, 0, 0.3); }
            50% { transform: scale(1.03); text-shadow: 0 0 20px rgba(255, 215, 0, 0.7); }
        }

        .manual-value { color: #ffffff; }
    </style>
</head>
<body>

<div class="widget-card">
    <div class="row">
        <div class="label">Стартовый баланс:</div>
        <div class="value-container">
            <span class="value manual-value">2 000 000</span>
        </div>
    </div>
    
    <div class="row">
        <div class="label">Бонуски:</div>
        <div class="value-container">
            <span id="purchased" class="value">0</span>
        </div>
    </div>
</div>

<script>
    async function updateCounter() {
        try {
            const response = await fetch('https://kiiaara.store/webhook/get-stats');
            const data = await response.json();
            const total = data.total || 0;
            // Убрали ₽ из вывода скрипта
            document.getElementById('purchased').innerText = total.toLocaleString('ru-RU');
        } catch (error) {
            console.error('Ошибка:', error);
        }
    }
    setInterval(updateCounter, 5000);
    updateCounter();
</script>

</body>
</html>
