<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Procurement Widget Final Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: transparent;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Montserrat', sans-serif;
            color: white;
        }

        .widget-card {
            background: rgba(10, 10, 10, 0.96); 
            padding: 35px 50px;
            border-radius: 35px; 
            border: 3px solid rgba(255, 215, 0, 0.4);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.25);
            backdrop-filter: blur(15px);
            display: inline-block;
            animation: borderBreathe 3s ease-in-out infinite;
        }

        @keyframes borderBreathe {
            0%, 100% { border-color: rgba(255, 215, 0, 0.2); box-shadow: 0 0 15px rgba(255, 215, 0, 0.1); }
            50% { border-color: rgba(255, 215, 0, 0.6); box-shadow: 0 0 35px rgba(255, 215, 0, 0.35); }
        }

        .row {
            display: flex;
            align-items: center; /* Центровка цифр по высоте букв */
            margin-bottom: 20px;
        }

        .row:last-child { margin-bottom: 0; }

        /* ЛЕВАЯ КОЛОНКА (СЛОВА) */
        .label-cell {
            width: 450px; /* Фиксируем ширину для слов */
            text-align: center; /* СЛОВА ВЫРОВНЕНЫ ПО ЦЕНТРУ */
            font-size: 32px; 
            text-transform: uppercase;
            font-weight: 700;
            color: #ddd;
            white-space: nowrap;
        }

        /* ПРАВАЯ КОЛОНКА (ЦИФРЫ) */
        .value-cell {
            width: 400px; /* Фиксируем ширину для цифр */
            text-align: center; /* ЦИФРЫ ВЫРОВНЕНЫ ПО ЦЕНТРУ */
        }

        .value {
            font-size: 54px; 
            font-weight: 900;
            line-height: 1;
            white-space: nowrap;
            display: inline-block;
        }

        #purchased {
            color: #FFD700;
            text-shadow: 0 0 12px rgba(255, 215, 0, 0.5);
            animation: textBreathe 3s ease-in-out infinite;
        }

        @keyframes textBreathe {
            0%, 100% { transform: scale(1); text-shadow: 0 0 8px rgba(255, 215, 0, 0.3); }
            50% { transform: scale(1.02); text-shadow: 0 0 20px rgba(255, 215, 0, 0.8); }
        }

        .manual-value { color: #ffffff; }
    </style>
</head>
<body>

<div class="widget-card">
    <div class="row">
        <div class="label-cell">Стартовый баланс:</div>
        <div class="value-cell">
            <span class="value manual-value">2 000 000</span>
        </div>
    </div>
    
    <div class="row">
        <div class="label-cell">Бонуски:</div>
        <div class="value-cell">
            <span id="purchased" class="value">0</span>
        </div>
    </div>
</div>

<script>
    async function updateCounter() {
        try {
            const response = await fetch('https://kiiaara.store/webhook/get-stats');
            const data = await response.json();
            const total = data.total || 0;
            document.getElementById('purchased').innerText = total.toLocaleString('ru-RU');
        } catch (error) {
            console.error('Ошибка:', error);
        }
    }
    setInterval(updateCounter, 5000);
    updateCounter();
</script>

</body>
</html>
