<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Procurement Widget Large</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: transparent;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Montserrat', sans-serif;
            color: white;
        }

        .widget-card {
            background: rgba(10, 10, 10, 0.92); /* Чуть плотнее фон */
            padding: 40px 55px; /* Увеличили внутренние отступы */
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            min-width: 500px; /* Сделали плашку шире под крупный текст */
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: baseline; /* Выравнивание по базовой линии текста */
            margin-bottom: 25px;
        }

        .row:last-child { margin-bottom: 0; }

        .label {
            font-size: 26px; /* Крупнее метки */
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #bbb;
            font-weight: 700;
        }

        .value {
            font-size: 54px; /* Массивные цифры */
            font-weight: 900;
            line-height: 1;
        }

        /* Анимированная желтая сумма */
        #purchased {
            color: #FFD700;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.4); /* Деликатное свечение */
            animation: breathe 3s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes breathe {
            0%, 100% {
                transform: scale(1);
                text-shadow: 0 0 8px rgba(255, 215, 0, 0.3);
            }
            50% {
                transform: scale(1.03); /* Легкое увеличение */
                text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
            }
        }

        .manual-value {
            color: #ffffff;
        }
    </style>
</head>
<body>

<div class="widget-card">
    <div class="row">
        <span class="label">СТАРТОВЫЙ БАЛАНС:</span>
        <span class="value manual-value">2 000 000 ₽</span>
    </div>
    
    <div class="row" style="margin-top: 10px;">
        <span class="label">БОНУСКИ:</span>
        <span id="purchased" class="value">0 ₽</span>
    </div>
</div>

<script>
    async function updateCounter() {
        try {
            const response = await fetch('https://kiiaara.store/webhook/get-stats');
            const data = await response.json();
            const total = data.total || 0;
            document.getElementById('purchased').innerText = total.toLocaleString('ru-RU') + ' ₽';
        } catch (error) {
            console.error('Ошибка:', error);
        }
    }
    setInterval(updateCounter, 5000);
    updateCounter();
</script>

</body>
</html>
