<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Procurement Widget</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: transparent;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Montserrat', sans-serif;
            color: white;
        }

        /* Основная плашка */
        .widget-card {
            background: rgba(20, 20, 20, 0.85); /* Темный фон */
            padding: 30px 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px); /* Размытие фона видео под виджетом */
            min-width: 350px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .row:last-child { margin-bottom: 0; }

        .label {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #bbb;
        }

        .value {
            font-size: 32px;
            font-weight: 900;
        }

        /* Стиль для динамической суммы (Закуплено) */
        #purchased {
            background: linear-gradient(45deg, #00dbde, #fc00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Стиль для ручного баланса (Было) */
        .manual-value {
            color: #ffffff;
        }
    </style>
</head>
<body>

<div class="widget-card">
    <div class="row">
        <span class="label">Было:</span>
        <span class="value manual-value">2 000 000 ₽</span>
    </div>
    
    <div class="row">
        <span class="label">Закуплено:</span>
        <span id="purchased" class="value">0 ₽</span>
    </div>
</div>

<script>
    async function updateCounter() {
        try {
            const response = await fetch('https://kiiaara.store/webhook/get-stats');
            const data = await response.json();
            
            const total = data.total || 0;
            document.getElementById('purchased').innerText = total.toLocaleString('ru-RU') + ' ₽';
        } catch (error) {
            console.error('Ошибка:', error);
        }
    }

    setInterval(updateCounter, 5000);
    updateCounter();
</script>

</body>
</html>
