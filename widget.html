<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Procurement Widget Final FIXED</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: transparent;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Montserrat', sans-serif;
            color: white;
        }

        .widget-card {
            background: rgba(10, 10, 10, 0.96); 
            padding: 40px 60px;
            border-radius: 35px; 
            /* ЯРКАЯ ТОЛСТАЯ РАМКА */
            border: 4px solid rgba(255, 215, 0, 0.5); 
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4); 
            backdrop-filter: blur(15px);
            display: inline-block;
            animation: borderBreathe 3s ease-in-out infinite;
        }

        /* МОЩНОЕ СВЕЧЕНИЕ РАМКИ */
        @keyframes borderBreathe {
            0%, 100% { 
                border-color: rgba(255, 215, 0, 0.4); 
                box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            }
            50% { 
                border-color: rgba(255, 215, 0, 0.9); 
                box-shadow: 0 0 60px rgba(255, 215, 0, 0.7), inset 0 0 15px rgba(255, 215, 0, 0.3);
            }
        }

        .row {
            display: flex;
            align-items: center; 
            margin-bottom: 25px;
        }

        .row:last-child { margin-bottom: 0; }

        /* ЛЕВАЯ КОЛОНКА (СЛОВА) - ЦЕНТРИРОВАНА */
        .label-cell {
            width: 450px; 
            text-align: center; 
            font-size: 34px; /* КРУПНЫЕ БУКВЫ */
            text-transform: uppercase;
            font-weight: 700;
            color: #ddd;
            white-space: nowrap;
        }

        /* ПРАВАЯ КОЛОНКА (ЦИФРЫ) - ЦЕНТРИРОВАНА */
        .value-cell {
            width: 400px; 
            text-align: center; 
        }

        .value {
            font-size: 56px; /* КРУПНЫЕ ЦИФРЫ */
            font-weight: 900;
            line-height: 1;
            white-space: nowrap;
            display: inline-block;
        }

        #purchased {
            color: #FFD700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            animation: textBreathe 3s ease-in-out infinite;
        }

        @keyframes textBreathe {
            0%, 100% { transform: scale(1); text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
            50% { transform: scale(1.03); text-shadow: 0 0 25px rgba(255, 215, 0, 0.8); }
        }

        .manual-value { color: #ffffff; }
    </style>
</head>
<body>

<div class="widget-card">
    <div class="row">
        <div class="label-cell">Стартовый баланс:</div>
        <div class="value-cell">
            <span class="value manual-value">1 000 000</span>
        </div>
    </div>
    
    <div class="row">
        <div class="label-cell">Бонуски:</div>
        <div class="value-cell">
            <span id="purchased" class="value">0</span>
        </div>
    </div>
</div>

<script>
    async function updateCounter() {
        try {
            const response = await fetch('https://kiiaara.store/webhook/get-stats');
            const data = await response.json();
            const total = data.total || 0;
            document.getElementById('purchased').innerText = total.toLocaleString('ru-RU');
        } catch (error) {
            console.error('Ошибка:', error);
        }
    }
    setInterval(updateCounter, 5000);
    updateCounter();
</script>

</body>
</html>
