<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Stream Widget</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: transparent; /* Чтобы фон был прозрачным в OBS */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            color: white;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
        }

        .container {
            text-align: center;
        }

        #sum {
            font-size: 72px;
            background: linear-gradient(45deg, #ff00cc, #3333ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(51, 51, 255, 0.5));
        }

        .label {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: -10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="label">Собрано на мечту</div>
    <div id="sum">0 ₽</div>
</div>

<script>
    async function updateCounter() {
        try {
            // Стучимся в твой n8n
            const response = await fetch('https://kiiaara.store/webhook/get-stats');
            const data = await response.json();
            
            // Берем поле "total" из твоего ответа {"total": 40}
            const total = data.total || 0;
            
            // Красиво выводим с разделением тысяч
            document.getElementById('sum').innerText = total.toLocaleString('ru-RU') + ' ₽';
        } catch (error) {
            console.error('Ошибка обновления:', error);
        }
    }

    // Обновляем каждые 5 секунд
    setInterval(updateCounter, 5000);
    // Запускаем первый раз сразу
    updateCounter();
</script>

</body>
</html>
