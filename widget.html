<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Procurement Widget</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: transparent;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Montserrat', sans-serif;
            color: white;
        }

        /* Основная плашка (фон) */
        .widget-card {
            background: rgba(15, 15, 15, 0.88); /* Почти черный, 88% непрозрачности */
            padding: 30px 45px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08); /* Тонкая рамка */
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px); /* Сильное размытие фона видео под виджетом */
            min-width: 380px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .row:last-child { margin-bottom: 0; }

        .label {
            font-size: 19px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #aaa; /* Светло-серый текст меток */
            font-weight: 700;
        }

        .value {
            font-size: 50px;
            font-weight: 900;
        }

        /* --- ВОТ ТУТ МАГИЯ АНИМАЦИИ --- */

       /* Обновленный стиль: меньше шума, больше четкости */
        #purchased {
            color: #FFD700; /* Золотой остается */
            
            /* Оставляем только один аккуратный слой тени */
            text-shadow: 0 0 6px rgba(255, 215, 0, 0.5); 
            
            animation: breathe 3s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes breathe {
            0%, 100% {
                transform: scale(1);
                text-shadow: 0 0 6px rgba(255, 215, 0, 0.4);
            }
            50% {
                transform: scale(1.02); /* Уменьшили амплитуду до 2% */
                /* На пике свечение теперь не "взрывается", а лишь слегка густеет */
                text-shadow: 0 0 12px rgba(255, 215, 0, 0.7);
            }
        }

        /* --- КОНЕЦ МАГИИ --- */

        /* Стиль для ручного баланса (Было) */
        .manual-value {
            color: #ffffff; /* Белый */
        }
    </style>
</head>
<body>

<div class="widget-card">
    <div class="row">
        <span class="label">Было:</span>
        <span class="value manual-value">2 000 000 ₽</span>
    </div>
    
    <div class="row">
        <span class="label">Закуплено:</span>
        <span id="purchased" class="value">0 ₽</span>
    </div>
</div>

<script>
    async function updateCounter() {
        try {
            const response = await fetch('https://kiiaara.store/webhook/get-stats');
            const data = await response.json();
            
            const total = data.total || 0;
            document.getElementById('purchased').innerText = total.toLocaleString('ru-RU') + ' ₽';
        } catch (error) {
            console.error('Ошибка:', error);
        }
    }

    // Обновляем каждые 5 секунд
    setInterval(updateCounter, 5000);
    // Запускаем первый раз сразу
    updateCounter();
</script>

</body>
</html>
